<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapApp - Ghost Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-surface: #121216;
            --bg-field: #1c1c24;
            --snap-yellow: #FFFC00;
            --snap-blue: #00b4ff;
            --snap-purple: #a445ff;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --border: rgba(255, 255, 255, 0.06);
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        
        /* Ekran logowania/rejestracji */
        .auth-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; width: 100%; padding: 20px; background: radial-gradient(circle at top right, #1f1235 0%, var(--bg-main) 100%); position: fixed; z-index: 10000; }
        .auth-box { background: var(--bg-surface); border: 1px solid var(--border); padding: 40px 30px; border-radius: 32px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .auth-box h2 { font-size: 32px; font-weight: 800; margin-bottom: 24px; background: linear-gradient(45deg, var(--snap-yellow), #ff5e00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-links { margin-top: 20px; font-size: 14px; color: var(--text-muted); cursor: pointer; text-decoration: underline; transition: color 0.2s; }
        .auth-links:hover { color: var(--text-main); }
        
        /* Kontener główny aplikacji */
        .app-container { display: none; flex-direction: column; height: 100vh; width: 100%; max-width: 480px; background: var(--bg-main); border-left: 1px solid var(--border); border-right: 1px solid var(--border); position: relative; }
        
        /* Nagłówek */
        .header { background: var(--bg-surface); padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .profile-badge { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 6px; }
        .profile-badge b { color: var(--snap-blue); }
        .admin-tag { background: var(--snap-purple); font-size: 10px; padding: 2px 6px; border-radius: 8px; font-weight: 900; letter-spacing: 0.5px; }
        
        /* Wyszukiwarka */
        .search-box { display: flex; gap: 8px; background: var(--bg-field); padding: 4px; border-radius: 20px; border: 1px solid var(--border); }
        .search-box input { background: transparent; border: none; padding: 8px 16px; color: white; flex: 1; outline: none; font-size: 14px; }
        .search-box button { background: var(--snap-blue); color: black; font-weight: 700; border-radius: 16px; padding: 6px 16px; border: none; cursor: pointer; font-size: 13px; }

        /* Relacje i Skróty */
        .section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; padding: 12px 20px 4px 20px; }
        .stories-container { display: flex; gap: 14px; padding: 10px 20px 16px 20px; overflow-x: auto; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg-surface); }
        .stories-container::-webkit-scrollbar { display: none; }
        
        .story-wrapper { display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: var(--text-muted); text-align: center; width: 64px; shrink: 0; }
        .story-circle { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--snap-yellow); padding: 2px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: var(--bg-main); transition: transform 0.2s; }
        .story-circle:active { transform: scale(0.92); }
        .story-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .story-circle.add-story { border: 2px dashed #444; color: var(--snap-yellow); font-size: 24px; font-weight: 300; background: var(--bg-field); }
        .story-circle.add-shortcut { border: 2px dashed #444; color: var(--snap-purple); font-size: 20px; background: var(--bg-field); }
        .story-text-avatar { width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: white; text-transform: uppercase; }

        /* Lista Rozmów */
        .recent-chats { padding: 12px 20px; display: flex; gap: 10px; overflow-x: auto; background: var(--bg-main); min-height: 55px; }
        .recent-chats::-webkit-scrollbar { display: none; }
        .chat-chip { background: var(--bg-surface); border: 1px solid var(--border); padding: 8px 16px; border-radius: 24px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; color: #d1d1d6; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .chat-chip.active { background: var(--snap-blue); color: #000; font-weight: 700; border-color: transparent; box-shadow: 0 4px 12px rgba(0,180,255,0.3); }

        /* Widok Czatu */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; background: linear-gradient(to bottom, var(--bg-main), #0f0f13); }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 78%; width: fit-content; }
        .msg-wrapper.me { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.them { align-self: flex-start; align-items: flex-start; }
        
        .msg { padding: 12px 18px; border-radius: 22px; font-size: 15px; position: relative; line-height: 1.4; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .msg.me { background: var(--snap-blue); color: black; border-bottom-right-radius: 4px; }
        .msg.them { background: var(--bg-surface); color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid var(--border); cursor: pointer; }
        
        /* Zabezpieczenie przed screenshotem (od siebie): blokowanie kopiowania */
        .ghost-blur { filter: blur(4px); transition: filter 0.2s; user-select: none; -webkit-user-select: none; }
        .ghost-blur:active { filter: blur(0px); }

        /* Panel dolnego wprowadzania wiadomości */
        .input-area { padding: 16px; background: var(--bg-surface); display: flex; gap: 12px; border-top: 1px solid var(--border); align-items: center; }
        .input-wrapper { flex: 1; display: flex; align-items: center; background: var(--bg-field); border-radius: 24px; padding-right: 6px; border: 1px solid var(--border); }
        .input-wrapper input { background: transparent; border: none; color: white; padding: 14px 20px; font-size: 15px; flex: 1; outline: none; }
        .icon-btn { background: var(--bg-field); border: 1px solid var(--border); color: white; width: 48px; height: 48px; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; shrink: 0; }
        .send-btn { background: var(--snap-yellow); color: black; border: none; padding: 10px 20px; border-radius: 20px; font-weight: 700; cursor: pointer; }

        /* Paski nawigacyjne */
        .tab-bar { display: flex; background: var(--bg-surface); border-top: 1px solid var(--border); min-height: 65px; }
        .tab-btn { flex: 1; background: none; border: none; color: var(--text-muted); font-size: 12px; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
        .tab-btn.active { color: var(--snap-yellow); }
        .panel { flex: 1; display: none; flex-direction: column; overflow: hidden; background: var(--bg-main); }
        .panel.active { display: flex; }
        #map { width: 100%; flex: 1; }

        /* Modal relacji */
        .story-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .story-modal img { max-width: 100%; max-height: 80vh; border-radius: 20px; }
        .story-modal .story-text-content { background: var(--bg-surface); padding: 40px; border-radius: 24px; width: 85%; max-width: 340px; text-align: center; font-size: 22px; font-weight: 700; }
        .story-top-info { position: absolute; top: 30px; left: 20px; right: 20px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
        .delete-story-btn { background: #ff3b30; color: white; border: none; padding: 8px 14px; border-radius: 14px; font-size: 12px; font-weight: 700; cursor: pointer; }

        input[type="text"], input[type="password"] { background: var(--bg-field); border: 1px solid var(--border); color: white; padding: 14px 20px; border-radius: 20px; font-size: 15px; outline: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

    <!-- LOGOWANIE -->
    <div class="auth-screen" id="loginScreen">
        <div class="auth-box">
            <h2>SnapApp 👻</h2>
            <input type="text" id="loginUsername" placeholder="Nazwa użytkownika..." style="width:100%; margin-bottom:12px;">
            <input type="password" id="loginPassword" placeholder="Hasło..." style="width:100%; margin-bottom:16px;">
            <button onclick="handleLogin()" style="width: 100%; background: var(--snap-yellow); color: black; font-weight:700; padding:14px; border-radius:20px; border:none; cursor:pointer;">Zaloguj się</button>
            <div class="auth-links" onclick="toggleAuthScreens(false)">Stwórz nowe konto</div>
        </div>
    </div>

    <!-- REJESTRACJA -->
    <div class="auth-screen" id="registerScreen" style="display: none;">
        <div class="auth-box">
            <h2>Dołącz teraz ✨</h2>
            <input type="text" id="regUsername" placeholder="Wybierz nick..." style="width:100%; margin-bottom:12px;">
            <input type="password" id="regPassword" placeholder="Wymyśl silne hasło..." style="width:100%; margin-bottom:16px;">
            <button onclick="handleRegister()" style="width: 100%; background: white; color: black; font-weight:700; padding:14px; border-radius:20px; border:none; cursor:pointer;">Zarejestruj się</button>
            <div class="auth-links" onclick="toggleAuthScreens(true)">Masz już konto? Zaloguj</div>
        </div>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="app-container" id="appContainer">
        <div id="panel-chat" class="panel active">
            <div class="header">
                <div class="header-top">
                    <div class="profile-badge">👻 <span>Profil: <b id="displayMyName"></b></span></div>
                    <button onclick="location.reload()" style="padding: 6px 12px; font-size: 12px; background: var(--bg-field); border: 1px solid var(--border); color:white; border-radius:12px; cursor:pointer;">Wyloguj</button>
                </div>
                <div class="search-box">
                    <input type="text" id="searchUser" placeholder="Szukaj znajomego po nicku...">
                    <button onclick="startChatWithSearchedUser()">Czat</button>
                </div>
            </div>

            <!-- RELACJE I SKRÓTY -->
            <div class="section-title">Relacje i Skróty</div>
            <div class="stories-container" id="storiesContainer">
                <div class="story-wrapper">
                    <div class="story-circle add-story" onclick="createNewStory()">+</div>
                    <span>Dodaj</span>
                </div>
                <div class="story-wrapper">
                    <div class="story-circle add-shortcut" onclick="createNewShortcut()">⚙️</div>
                    <span>Skrót</span>
                </div>
            </div>

            <div class="section-title">Rozmowy</div>
            <div class="recent-chats" id="recentChats"></div>

            <div style="background: var(--bg-surface); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);" id="chatSubHeader">
                <span id="currentChatTitle" style="font-weight:700; color:#fff; font-size:14px;">Wybierz czat</span>
            </div>

            <!-- OKNO CZATU -->
            <div id="chat-box">
                <div style="text-align: center; color: var(--text-muted); margin-top: 40px; font-size:14px;">Wybierz znajomego, aby rozpocząć bezpieczne snapowanie!</div>
            </div>

            <!-- INPUT AREA -->
            <div class="input-area" id="inputArea" style="display: none;">
                <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="sendImage(this)">
                <button class="icon-btn" onclick="document.getElementById('imageInput').click()">📸</button>
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Wyślij znikającą wiadomość...">
                    <button class="send-btn" onclick="sendMessage()">Wyślij</button>
                </div>
            </div>
        </div>

        <div id="panel-map" class="panel">
            <div id="map"></div>
        </div>

        <!-- NAVBAR DOLNY -->
        <div class="tab-bar">
            <button class="tab-btn active" id="btn-tab-chat" onclick="switchTab('chat')">💬 <span>Czaty</span></button>
            <button class="tab-btn" id="btn-tab-map" onclick="switchTab('map')">🗺️ <span>SnapMap</span></button>
        </div>
    </div>

    <!-- MODAL RELACJI -->
    <div class="story-modal" id="storyModal">
        <div class="story-top-info">
            <div style="display:flex; align-items:center; gap:8px;"><span style="font-size:20px;">👻</span> <span id="storyModalAuthor">Autor</span> <span id="storyViewsBadge" style="font-size:12px; background:rgba(255,255,255,0.1); padding:2px 6px; border-radius:6px;"></span></div>
            <div id="storyDeleteContainer"></div>
        </div>
        <div id="storyModalContent" style="width: 100%; display: flex; justify-content: center; align-items: center;" onclick="closeStoryModal()"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- KONFIGURACJA FIREBASE MODUŁOWA (2026 PRO) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, where, onSnapshot, updateDoc, deleteDoc, orderBy, getDocs, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Twoja konfiguracja z Firebase, którą skopiowałeś:
        const firebaseConfig = {
            apiKey: "AIzaSyDQ3TtLG4Vem4LiElySooJnnJPQy-DRBSw",
            authDomain: "apka-32bf2.firebaseapp.com",
            projectId: "apka-32bf2",
            storageBucket: "apka-32bf2.firebasestorage.app",
            messagingSenderId: "636664684649",
            appId: "1:636664684649:web:2b38ae035e2d4c112b42f8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Zmienne globalne stanu aplikacji
        let currentUser = null;
        let activeChatUser = null;
        let activeShortcut = null;
        let map = null;
        let mapMarker = null;
        let activeListeners = [];

        // Wyciągamy funkcje do okna globalnego, by HTML miał do nich dostęp
        window.handleLogin = handleLogin;
        window.handleRegister = handleRegister;
        window.toggleAuthScreens = toggleAuthScreens;
        window.startChatWithSearchedUser = startChatWithSearchedUser;
        window.sendMessage = sendMessage;
        window.sendImage = sendImage;
        window.createNewStory = createNewStory;
        window.createNewShortcut = createNewShortcut;
        window.selectChat = selectChat;
        window.switchTab = switchTab;
        window.closeStoryModal = closeStoryModal;
        window.deleteStory = deleteStory;

        // --- OBSŁUGA EKRANÓW I LOGOWANIA ---
        function toggleAuthScreens(showLogin) {
            document.getElementById('loginScreen').style.display = showLogin ? 'flex' : 'none';
            document.getElementById('registerScreen').style.display = showLogin ? 'none' : 'flex';
        }

        async function handleRegister() {
            const user = document.getElementById('regUsername').value.trim().toLowerCase();
            const pass = document.getElementById('regPassword').value.trim();
            if(!user || !pass) return alert("Uzupełnij pola!");

            const userRef = doc(db, "users", user);
            const userSnap = await getDoc(userRef);

            if(userSnap.exists()) {
                alert("Ten użytkownik już istnieje!");
                return;
            }

            const hashedPassword = CryptoJS.SHA256(pass).toString();
            await setDoc(userRef, {
                username: user,
                password: hashedPassword,
                createdAt: Date.now(),
                shortcuts: []
            });

            alert("Konto utworzone! Zaloguj się.");
            toggleAuthScreens(true);
        }

        async function handleLogin() {
            const user = document.getElementById('loginUsername').value.trim().toLowerCase();
            const pass = document.getElementById('loginPassword').value.trim();
            if(!user || !pass) return alert("Uzupełnij pola!");

            const userRef = doc(db, "users", user);
            const userSnap = await getDoc(userRef);

            if(!userSnap.exists()) {
                alert("Nie ma takiego użytkownika!");
                return;
            }

            const hashedPassword = CryptoJS.SHA256(pass).toString();
            if(userSnap.data().password !== hashedPassword) {
                alert("Błędne hasło!");
                return;
            }

            currentUser = userSnap.data();
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
            document.getElementById('displayMyName').innerText = currentUser.username;

            initApp();
        }

        function initApp() {
            listenToGlobalStories();
            listenToActiveChatsList();
            initSnapMap();
            listenToPrivateNotifications(); 
        }

        // --- CZAT W TRYBIE GHOST (BEZ ZAPISYWANIA W BAZIE) ---
        function listenToMessages(chatWith) {
            activeListeners.forEach(unsub => unsub());
            activeListeners = [];

            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = '';

            const q = query(
                collection(db, "ghost_messages"),
                where("receiverId", "==", currentUser.username),
                where("senderId", "==", chatWith)
            );

            const unsub = onSnapshot(q, (snapshot) => {
                snapshot.docChanges().forEach(async (change) => {
                    if (change.type === "added") {
                        const msgData = change.doc.data();
                        const msgId = change.doc.id;

                        renderGhostMessage(msgData, msgId);

                        // Natychmiastowe spalenie wiadomości w bazie
                        await deleteDoc(doc(db, "ghost_messages", msgId));
                    }
                });
            });

            activeListeners.push(unsub);
        }

        function renderGhostMessage(data, id) {
            const chatBox = document.getElementById('chat-box');
            const wrapper = document.createElement('div');
            wrapper.className = "msg-wrapper them";

            let contentHTML = '';
            if(data.type === 'image') {
                contentHTML = `<img src="${data.content}" style="max-width:200px; border-radius:12px;" />`;
            } else {
                contentHTML = data.content;
            }

            wrapper.innerHTML = `
                <div class="msg them ghost-blur" title="Przytrzymaj, aby zobaczyć">
                    ${contentHTML}
                </div>
                <span style="font-size:9px; color:var(--text-muted); margin-top:2px;">Znikająca wiadomość-widmo</span>
            `;

            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if(!content || !activeChatUser) return;

            const chatBox = document.getElementById('chat-box');
            const wrapper = document.createElement('div');
            wrapper.className = "msg-wrapper me";
            wrapper.innerHTML = `<div class="msg me">${content}</div>`;
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;

            await addDoc(collection(db, "ghost_messages"), {
                senderId: currentUser.username,
                receiverId: activeChatUser,
                content: content,
                type: 'text',
                timestamp: Date.now()
            });

            await setDoc(doc(db, "active_chats", `${currentUser.username}_${activeChatUser}`), {
                userA: currentUser.username,
                userB: activeChatUser,
                lastActive: Date.now()
            });

            input.value = '';
        }

        async function sendImage(fileInput) {
            const file = fileInput.files[0];
            if(!file || !activeChatUser) return;

            const reader = new FileReader();
            reader.onloadend = async function() {
                const base64Data = reader.result;

                const chatBox = document.getElementById('chat-box');
                const wrapper = document.createElement('div');
                wrapper.className = "msg-wrapper me";
                wrapper.innerHTML = `<div class="msg me" style="background:transparent; padding:0;"><img src="${base64Data}" style="max-width:200px; border-radius:12px;" /></div>`;
                chatBox.appendChild(wrapper);
                chatBox.scrollTop = chatBox.scrollHeight;

                await addDoc(collection(db, "ghost_messages"), {
                    senderId: currentUser.username,
                    receiverId: activeChatUser,
                    content: base64Data,
                    type: 'image',
                    timestamp: Date.now()
                });
            };
            reader.readAsDataURL(file);
        }

        // --- HISTORIE (STORIES) Z LIMITAMI WYŚWIETLEŃ 1 LUB 2-RAZOWYCH ---
        async function createNewStory() {
            const content = prompt("Wpisz tekst Twojej relacji:");
            if(!content) return;

            const maxViews = prompt("Ile razy można to wyświetlić? Wpisz 1 lub 2:", "1");
            const allowedViews = (maxViews === "2") ? 2 : 1;

            await addDoc(collection(db, "stories"), {
                author: currentUser.username,
                content: content,
                type: 'text',
                maxViews: allowedViews,
                viewsCount: 0,
                viewedBy: [],
                createdAt: Date.now()
            });

            alert("Relacja dodana!");
        }

        function listenToGlobalStories() {
            const container = document.getElementById('storiesContainer');
            
            const q = query(collection(db, "stories"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const items = container.querySelectorAll('.story-wrapper');
                items.forEach((item, index) => { if(index > 1) item.remove(); });

                snapshot.forEach((docSnap) => {
                    const story = docSnap.data();
                    const storyId = docSnap.id;

                    if(story.viewedBy.filter(u => u === currentUser.username).length >= story.maxViews) {
                        return; 
                    }

                    const wrapper = document.createElement('div');
                    wrapper.className = "story-wrapper";
                    
                    wrapper.innerHTML = `
                        <div class="story-circle" id="circle-${storyId}">
                            <div class="story-text-avatar">${story.author.substring(0, 2)}</div>
                        </div>
                        <span>${story.author}</span>
                    `;

                    wrapper.querySelector('.story-circle').addEventListener('click', () => openStory(storyId, story));
                    container.appendChild(wrapper);
                });
            });
        }

        async function openStory(storyId, story) {
            const modal = document.getElementById('storyModal');
            const contentZone = document.getElementById('storyModalContent');
            const authorZone = document.getElementById('storyModalAuthor');
            const badgeZone = document.getElementById('storyViewsBadge');
            const deleteContainer = document.getElementById('storyDeleteContainer');

            authorZone.innerText = story.author;
            badgeZone.innerText = `Limit: ${story.maxViews}x`;
            contentZone.innerHTML = `<div class="story-text-content">${story.content}</div>`;

            if(story.author === currentUser.username) {
                deleteContainer.innerHTML = `<button class="delete-story-btn" onclick="deleteStory('${storyId}')">Usuń relację</button>`;
            } else {
                deleteContainer.innerHTML = '';
            }

            modal.style.display = 'flex';

            // Logika drugiego obejrzenia + ciche powiadomienie
            if(story.author !== currentUser.username) {
                const updatedViewedBy = [...story.viewedBy, currentUser.username];
                const newViewsCount = story.viewsCount + 1;
                const timesThisUserWatched = updatedViewedBy.filter(u => u === currentUser.username).length;

                if(story.maxViews === 2 && timesThisUserWatched === 2) {
                    await addDoc(collection(db, "ghost_notifications"), {
                        targetUser: story.author,
                        senderUser: currentUser.username,
                        message: `Użytkownik ${currentUser.username} obejrzał Twoją relację po raz drugi!`,
                        timestamp: Date.now()
                    });
                }

                const storyRef = doc(db, "stories", storyId);
                await updateDoc(storyRef, {
                    viewsCount: newViewsCount,
                    viewedBy: arrayUnion(currentUser.username)
                });
            }
        }

        function closeStoryModal() {
            document.getElementById('storyModal').style.display = 'none';
        }

        async function deleteStory(storyId) {
            if(confirm("Czy na pewno chcesz trwale usunąć tę relację?")) {
                await deleteDoc(doc(db, "stories", storyId));
                closeStoryModal();
                alert("Relacja została skasowana.");
            }
        }

        // --- SYSTEM POWIADOMIEŃ NADAWCY ---
        function listenToPrivateNotifications() {
            const q = query(
                collection(db, "ghost_notifications"), 
                where("targetUser", "==", currentUser.username)
            );

            onSnapshot(q, (snapshot) => {
                snapshot.docChanges().forEach(async (change) => {
                    if(change.type === "added") {
                        const notif = change.doc.data();
                        const notifId = change.doc.id;

                        alert(`🔔 Powiadomienie: ${notif.message}`);
                        await deleteDoc(doc(db, "ghost_notifications", notifId));
                    }
                });
            });
        }

        // --- SKRÓTY I LISTA ROZMÓW ---
        async function createNewShortcut() {
            const name = prompt("Podaj nazwę nowego skrótu grupy znajomych:");
            if(!name) return;
            activeShortcut = name;
            alert(`Ustawiono aktywny skrót: ${name}. Kliknij na znajomego, aby pisać w tym skrócie.`);
        }

        function listenToActiveChatsList() {
            const container = document.getElementById('recentChats');
            const q = query(collection(db, "active_chats"), orderBy("lastActive", "desc"));
            
            onSnapshot(q, (snapshot) => {
                container.innerHTML = '';
                let addedUsers = new Set();

                snapshot.forEach((docSnap) => {
                    const c = docSnap.data();
                    let target = (c.userA === currentUser.username) ? c.userB : c.userA;
                    
                    if(target !== currentUser.username && !addedUsers.has(target)) {
                        addedUsers.add(target);
                        const chip = document.createElement('div');
                        chip.className = `chat-chip ${activeChatUser === target ? 'active' : ''}`;
                        chip.innerHTML = `👤 <span>${target}</span>`;
                        chip.onclick = () => selectChat(target, chip);
                        container.appendChild(chip);
                    }
                });
            });
        }

        async function startChatWithSearchedUser() {
            const target = document.getElementById('searchUser').value.trim().toLowerCase();
            if(!target || target === currentUser.username) return alert("Niepoprawny użytkownik!");

            const userRef = doc(db, "users", target);
            const userSnap = await getDoc(userRef);

            if(!userSnap.exists()) {
                alert("Nie znaleziono takiego użytkownika.");
                return;
            }

            selectChat(target);
        }

        function selectChat(username, element = null) {
            activeChatUser = username;
            document.getElementById('currentChatTitle').innerText = `Rozmowa z: @${username} ${activeShortcut ? `[Skrót: ${activeShortcut}]` : ''}`;
            document.getElementById('inputArea').style.display = 'flex';
            
            document.querySelectorAll('.chat-chip').forEach(el => el.classList.remove('active'));
            if(element) element.classList.add('active');

            listenToMessages(username);
        }

        // --- NAWIGACJA TABS ---
        function switchTab(tab) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            document.getElementById(`panel-${tab}`).classList.add('active');
            document.getElementById(`btn-tab-${tab}`).classList.add('active');

            if(tab === 'map') {
                setTimeout(() => { map.invalidateSize(); }, 200);
                updateMyLocation();
            }
        }

        // --- SNAPMAP ---
        function initSnapMap() {
            map = L.map('map').setView([52.237, 21.017], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
        }

        function updateMyLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;

                    if (mapMarker) {
                        mapMarker.setLatLng([lat, lng]);
                    } else {
                        mapMarker = L.marker([lat, lng]).addTo(map)
                            .bindPopup(`<b>Ty (${currentUser.username})</b><br>Nadajesz w trybie Ghost.`).openPopup();
                    }
                    map.setView([lat, lng], 14);
                });
            }
        }
    </script>
</body>
</html>
