<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperApp z Panelem Admina</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #0b0b0c; color: #f5f6f7; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        /* Auth Screen */
        .auth-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; width: 100%; padding: 20px; background: linear-gradient(135deg, #0f0c20 0%, #060608 100%); }
        .auth-box { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); padding: 35px; border-radius: 24px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .auth-box h2 { font-size: 28px; margin-bottom: 20px; background: linear-gradient(45deg, #0084ff, #a445ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-links { margin-top: 15px; font-size: 14px; color: #aaa; cursor: pointer; text-decoration: underline; }
        
        /* App Container */
        .app-container { display: flex; flex-direction: column; height: 100vh; width: 100%; max-width: 600px; background: #16161a; display: none; overflow: hidden; position: relative; }
        .header { background: #1e1e24; padding: 12px 20px; border-bottom: 1px solid #2a2a35; }
        .search-box { display: flex; gap: 10px; margin-top: 8px; }
        
        /* Sekcja Stories (Relacje) */
        .stories-container { display: flex; gap: 12px; padding: 12px 20px; background: #1a1a20; border-bottom: 1px solid #25252e; overflow-x: auto; align-items: center; }
        .story-circle { width: 56px; height: 56px; border-radius: 50%; border: 2.5px solid #0084ff; padding: 2px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; background: #121214; }
        .story-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .story-circle.add-story { border: 2px dashed #555; color: #aaa; font-size: 20px; font-weight: bold; }
        .story-text-avatar { width: 100%; height: 100%; border-radius: 50%; background: #a445ff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: white; text-align: center; overflow: hidden; text-transform: uppercase; }

        /* Modal do oglądania relacji */
        .story-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .story-modal img { max-width: 100%; max-height: 70vh; border-radius: 12px; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .story-modal .story-text-content { background: #1e1e24; padding: 30px; border-radius: 16px; min-width: 280px; text-align: center; font-size: 20px; font-weight: bold; border: 1px solid #3a3a45; }

        /* Zakładki i Panele */
        .tab-bar { display: flex; background: #1e1e24; border-top: 1px solid #2a2a35; min-height: 60px; z-index: 1000; }
        .tab-btn { flex: 1; background: none; border: none; color: #777; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
        .tab-btn.active { color: #0084ff; }
        .panel { flex: 1; display: none; flex-direction: column; overflow: hidden; background: #121214; }
        .panel.active { display: flex; }

        /* Skrzynka odebranych czatów */
        .recent-chats { padding: 10px 20px; background: #1a1a20; border-bottom: 1px solid #25252e; display: flex; gap: 10px; overflow-x: auto; align-items: center; min-height: 50px; }
        .chat-chip { background: #252530; padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; white-space: nowrap; color: #b0b3b8; display: flex; align-items: center; gap: 6px; }
        .chat-chip.active { background: #0084ff; color: white; font-weight: bold; }
        .group-chip { border: 1px solid #a445ff; }

        /* Okno wiadomości */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 75%; width: fit-content; }
        .msg-wrapper.me { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.them { align-self: flex-start; align-items: flex-start; }
        
        .msg-sender { font-size: 11px; color: #888; margin-bottom: 2px; padding: 0 4px; }
        .msg { padding: 12px 16px; border-radius: 18px; word-break: break-word; font-size: 15px; position: relative; width: 100%; }
        .msg img { max-width: 100%; border-radius: 12px; margin-top: 5px; display: block; cursor: pointer; }
        
        .msg.me { background: linear-gradient(135deg, #0076ff, #0084ff); color: white; border-bottom-right-radius: 4px; }
        .msg.them { background: #242526; color: #e4e6eb; border-bottom-left-radius: 4px; }
        
        .msg-meta { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 4px; display: flex; gap: 8px; justify-content: flex-end; width: 100%; }
        .msg.them .msg-meta { color: #888; }
        .msg-actions { font-size: 11px; color: #0084ff; cursor: pointer; margin-left: 5px; font-weight: bold; }
        .msg-actions.del { color: #ff4d4d; }

        .input-area { padding: 16px; background: #1e1e24; display: flex; gap: 10px; border-top: 1px solid #2a2a35; align-items: center; }
        #map { width: 100%; flex: 1; z-index: 1; }
        
        /* Panel Admina */
        .admin-list { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .admin-user-row { background: #1e1e24; padding: 15px; border-radius: 14px; display: flex; flex-direction: column; gap: 8px; border: 1px solid #2a2a35; }
        .admin-user-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a35; padding-bottom: 6px; }
        .admin-user-details { font-size: 12px; color: #aaa; display: flex; flex-direction: column; gap: 3px; }
        
        .status-dot { width: 10px; height: 10px; background: #444; border-radius: 50%; display: inline-block; }
        .status-dot.online { background: #31a24c; box-shadow: 0 0 8px #31a24c; }

        input { background: #2a2a35; border: 1px solid transparent; color: white; padding: 12px 18px; border-radius: 24px; font-size: 15px; flex: 1; outline: none; }
        button { background: #0084ff; color: white; border: none; padding: 12px 20px; border-radius: 24px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .icon-btn { background: #333; padding: 12px; border-radius: 50%; font-size: 16px; display: flex; align-items: center; justify-content: center; width: 45px; height: 45px; cursor: pointer; border:none;}
        .delete-pin-btn { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 12px; font-size: 11px; font-weight: bold; cursor: pointer; margin-top: 8px; display: block; width: 100%; }
        .ban-btn { background: #e03b3b; font-size: 11px; padding: 6px 12px; border-radius: 12px; font-weight: bold; color: white; border: none; cursor: pointer; }
        .ban-btn.unban { background: #31a24c; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

    <!-- OKNO LOGOWANIA -->
    <div class="auth-screen" id="loginScreen">
        <div class="auth-box">
            <h2>Zaloguj się 💬</h2>
            <input type="text" id="loginUsername" placeholder="Twój nick..." style="margin-bottom:8px;">
            <input type="password" id="loginPassword" placeholder="Hasło..." style="margin-bottom:8px;">
            <button onclick="handleLogin()" style="width: 100%; margin-top: 10px;">Zaloguj</button>
            <div class="auth-links" onclick="toggleAuthScreens(false)">Nie masz konta? Zarejestruj się</div>
        </div>
    </div>

    <!-- OKNO REJESTRACJI -->
    <div class="auth-screen" id="registerScreen" style="display: none;">
        <div class="auth-box">
            <h2>Zarejestruj się ✨</h2>
            <input type="text" id="regUsername" placeholder="Wymyśl nick..." style="margin-bottom:8px;">
            <input type="password" id="regPassword" placeholder="Wymyśl hasło..." style="margin-bottom:8px;">
            <button onclick="handleRegister()" style="width: 100%; margin-top: 10px;">Stwórz konto</button>
            <div class="auth-links" onclick="toggleAuthScreens(true)">Masz już konto? Zaloguj się</div>
        </div>
    </div>

    <!-- GŁÓWNA APLIKACJA -->
    <div class="app-container" id="appContainer">
        
        <!-- PANEL CZATU -->
        <div id="panel-chat" class="panel active">
            <div class="header">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span>Profil: <b id="displayMyName" style="color: #0084ff;"></b> <span id="adminBadge" style="color: #a445ff; font-weight: bold; display: none;">[ADMIN]</span></span>
                    <button onclick="location.reload()" style="padding: 4px 10px; font-size: 11px; background: #333;">Wyloguj</button>
                </div>
                <div class="search-box">
                    <input type="text" id="searchUser" placeholder="Wyszukaj znajomego po nicku...">
                    <button onclick="startChatWithSearchedUser()">Czat</button>
                </div>
            </div>

            <!-- RELACJE (STORIES) -->
            <div class="stories-container" id="storiesContainer">
                <div class="story-circle add-story" onclick="createNewStory()">+</div>
            </div>

            <!-- SKRZYNKA ODEBRANYCH CZATÓW -->
            <div class="recent-chats" id="recentChats"></div>

            <!-- OKNO ROZMOWY -->
            <div style="background: #1a1a20; padding: 6px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #25252e;" id="chatSubHeader">
                <span id="currentChatTitle" style="font-weight:bold; color:#0084ff;">Wybierz lub wyszukaj czat</span>
                <button id="createGroupBtn" style="display:none; padding:4px 10px; font-size:11px; background:#a445ff;" onclick="convertChatToGroup()">+ Utwórz grupę</button>
            </div>

            <div id="chat-box">
                <div style="text-align: center; color: #555; margin-top: 40px;">Wybierz osobę lub grupę z listy powyżej albo wyszukaj znajomego.</div>
            </div>

            <!-- INPUT CZATU -->
            <div class="input-area" id="inputArea" style="display: none;">
                <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="sendImage(this)">
                <button class="icon-btn" onclick="document.getElementById('imageInput').click()">🖼️</button>
                <input type="text" id="messageInput" placeholder="Napisz wiadomość...">
                <button onclick="sendMessage()">Wyślij</button>
            </div>
        </div>

        <!-- PANEL MAPY -->
        <div id="panel-map" class="panel">
            <div style="background: #1e1e24; padding: 10px; text-align: center; font-size: 12px; color: #aaa;">Kliknij na mapę, aby dodać pinezkę.</div>
            <div id="map"></div>
        </div>

        <!-- PANEL ADMINA -->
        <div id="panel-admin" class="panel">
            <div style="background: #1e1e24; padding: 15px; text-align: center; font-weight: bold; color: #a445ff; border-bottom: 1px solid #2a2a35;">PANEL ADMINISTRATORA</div>
            <div class="admin-list" id="adminUsersList"></div>
        </div>

        <!-- DOLNE ZAKŁADKI -->
        <div class="tab-bar">
            <button class="tab-btn active" id="btn-tab-chat" onclick="switchTab('chat')">💬 <span>Czat</span></button>
            <button class="tab-btn" id="btn-tab-map" onclick="switchTab('map')">📍 <span>Mapa</span></button>
            <button class="tab-btn" id="btn-tab-admin" onclick="switchTab('admin')" style="display: none;">👑 <span>Admin</span></button>
        </div>
    </div>

    <!-- MODAL DO OGLĄDANIA RELACJI -->
    <div class="story-modal" id="storyModal" onclick="this.style.display='none'">
        <div style="position: absolute; top: 20px; left: 20px; font-weight: bold;" id="storyModalAuthor">Autor</div>
        <div id="storyModalContent" style="width: 100%; display: flex; justify-content: center; align-items: center;"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, getDoc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { projectId: "apka-32bf2" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let myNick = "";
        let currentRoomId = "";
        let isGroupRoom = false;
        let activeChatParticipants = [];
        let unsubscribeMessages = null;
        let activeInboxRooms = [];
        let map, markersGroup;

        // Proste rozpoznawanie urządzenia z UserAgent
        function getDeviceModel() {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) {
                const match = ua.match(/Android\s([0-9\.]+);.*?(Build\/|\s)([A-Z0-9_-]+)/i);
                return match ? `Android (Model: ${match[3]})` : "Urządzenie z Androidem";
            }
            if (/iPhone|iPad|iPod/i.test(ua)) return "Apple iOS (iPhone/iPad)";
            if (/Windows/i.test(ua)) return "Komputer (Windows PC)";
            if (/Macintosh/i.test(ua)) return "Komputer (Apple Mac)";
            if (/Linux/i.test(ua)) return "Komputer (Linux)";
            return "Nieznane urządzenie";
        }

        function hashPassword(string) { return CryptoJS.SHA256(string).toString(); }
        window.toggleAuthScreens = function(showLogin) {
            document.getElementById("loginScreen").style.display = showLogin ? "flex" : "none";
            document.getElementById("registerScreen").style.display = showLogin ? "none" : "flex";
        }

        // REJESTRACJA + Zapisywanie informacji o urządzeniu
        window.handleRegister = async function() {
            const user = document.getElementById("regUsername").value.trim().toLowerCase();
            const pass = document.getElementById("regPassword").value.trim();
            if(!user || !pass) return alert("Uzupełnij wszystkie pola!");
            const userRef = doc(db, "users", user);
            const userSnap = await getDoc(userRef);
            if(userSnap.exists()) return alert("Taki użytkownik już istnieje!");
            
            await setDoc(userRef, { 
                password: hashPassword(pass), 
                isBanned: false, 
                createdAt: Date.now(),
                deviceInfo: getDeviceModel()
            });
            alert("Konto utworzone!"); toggleAuthScreens(true);
        }

        // LOGOWANIE + Aktualizacja info o urządzeniu przy ponownym wjeździe
        window.handleLogin = async function() {
            const user = document.getElementById("loginUsername").value.trim().toLowerCase();
            const pass = document.getElementById("loginPassword").value.trim();
            if(!user || !pass) return alert("Uzupełnij wszystkie pola!");
            const userRef = doc(db, "users", user);
            const userSnap = await getDoc(userRef);
            if(!userSnap.exists() || userSnap.data().password !== hashPassword(pass)) return alert("Błędny nick lub hasło!");
            if(userSnap.data().isBanned) return alert("Zostałeś zbanowany!");

            myNick = user;
            // Aktualizacja urządzenia i ostatniego logowania w locie
            await updateDoc(userRef, { deviceInfo: getDeviceModel() });

            document.getElementById("displayMyName").innerText = myNick;
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("appContainer").style.display = "flex";

            if(myNick === "ogxldtg") {
                document.getElementById("adminBadge").style.display = "inline";
                document.getElementById("btn-tab-admin").style.display = "flex";
                listenToAllUsersForAdmin();
            } else {
                onSnapshot(doc(db, "users", myNick), (docSnap) => { if (docSnap.exists() && docSnap.data().isBanned) location.reload(); });
            }

            updatePresence(); setInterval(updatePresence, 4000);
            listenToInbox();
            listenToStories();
            initMap();
        }

        async function updatePresence() { if (myNick) await setDoc(doc(db, "presence", myNick), { lastActive: Date.now() }); }

        // AUTOMATYCZNY INBOX
        function listenToInbox() {
            onSnapshot(collection(db, "rooms"), (snapshot) => {
                activeInboxRooms = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.participants && data.participants.includes(myNick)) {
                        activeInboxRooms.push({ id: doc.id, ...data });
                    }
                });
                renderInboxUI();
            });
        }

        function renderInboxUI() {
            const container = document.getElementById("recentChats");
            container.innerHTML = "";
            activeInboxRooms.forEach(room => {
                const chip = document.createElement("div");
                chip.className = `chat-chip ${room.id === currentRoomId ? 'active' : ''} ${room.isGroup ? 'group-chip' : ''}`;
                
                let title = room.isGroup ? `👥 ${room.groupName}` : `👤 ${room.participants.find(p => p !== myNick)}`;
                chip.innerText = title;
                chip.onclick = () => openChatRoom(room.id, room.isGroup, room.participants, room.groupName || title);
                container.appendChild(chip);
            });
        }

        window.startChatWithSearchedUser = async function() {
            const target = document.getElementById("searchUser").value.trim().toLowerCase();
            if (!target || target === myNick) return alert("Błędny nick!");
            
            const userRef = doc(db, "users", target);
            const userSnap = await getDoc(userRef);
            if(!userSnap.exists()) return alert("Taki użytkownik nie istnieje!");

            const roomId = [myNick, target].sort().join("_VS_");
            await setDoc(doc(db, "rooms", roomId), { participants: [myNick, target], isGroup: false });
            document.getElementById("searchUser").value = "";
            openChatRoom(roomId, false, [myNick, target], target);
        }

        function openChatRoom(roomId, isGroup, participants, title) {
            currentRoomId = roomId;
            isGroupRoom = isGroup;
            activeChatParticipants = participants;
            
            document.getElementById("currentChatTitle").innerText = isGroup ? `Grupa: ${title}` : `Rozmowa z: ${title}`;
            document.getElementById("createGroupBtn").style.display = isGroup ? "none" : "block";
            document.getElementById("inputArea").style.display = "flex";
            
            renderInboxUI();
            listenToMessages();
        }

        // TWORZENIE GRUPY
        window.convertChatToGroup = async function() {
            if (isGroupRoom) return;
            const otherUser = activeChatParticipants.find(p => p !== myNick);
            const inputUsers = prompt("Wpisz nicki innych użytkowników po przecinku (np. tomek, ania):");
            if (!inputUsers) return;
            
            let parsed = inputUsers.split(",").map(u => u.trim().toLowerCase()).filter(u => u.length > 0);
            let finalParticipants = Array.from(new Set([myNick, otherUser, ...parsed]));
            
            const groupName = prompt("Wpisz nazwę dla grupy:");
            if (!groupName) return;

            const newGroupId = "group_" + Date.now();
            await setDoc(doc(db, "rooms", newGroupId), { id: newGroupId, participants: finalParticipants, isGroup: true, groupName: groupName, createdBy: myNick });
            openChatRoom(newGroupId, true, finalParticipants, groupName);
        }

        // NASŁUCHIWANIE WIADOMOŚCI
        function listenToMessages() {
            if (unsubscribeMessages) unsubscribeMessages();
            const msgSubcollectionRef = collection(db, "rooms", currentRoomId, "messages");
            unsubscribeMessages = onSnapshot(msgSubcollectionRef, (snapshot) => {
                const chatBox = document.getElementById("chat-box");
                chatBox.innerHTML = "";
                let messages = [];
                snapshot.forEach(doc => messages.push({ id: doc.id, ...doc.data() }));
                messages.sort((a,b) => (a.timestamp || 0) - (b.timestamp || 0));
                
                messages.forEach(data => {
                    const wrapper = document.createElement("div");
                    wrapper.className = `msg-wrapper ${data.sender === myNick ? 'me' : 'them'}`;
                    
                    const senderLabel = document.createElement("div");
                    senderLabel.className = "msg-sender";
                    senderLabel.innerText = data.sender;
                    wrapper.appendChild(senderLabel);

                    const msgDiv = document.createElement("div");
                    msgDiv.className = data.sender === myNick ? "msg me" : "msg them";
                    
                    if (data.type === "image") {
                        const img = document.createElement("img");
                        img.src = data.text;
                        img.onclick = () => window.showBigImg(data.text, data.sender);
                        msgDiv.appendChild(img);
                    } else {
                        const txt = document.createElement("span");
                        txt.innerText = data.text + (data.edited ? " (edytowano)" : "");
                        msgDiv.appendChild(txt);
                    }

                    const timeStr = data.timestamp ? new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";
                    const meta = document.createElement("div");
                    meta.className = "msg-meta";
                    meta.innerText = timeStr;

                    if (data.sender === myNick) {
                        if (data.type !== "image") {
                            const editBtn = document.createElement("span");
                            editBtn.className = "msg-actions";
                            editBtn.innerText = "[E]";
                            editBtn.onclick = () => editMessage(data.id, data.text);
                            meta.appendChild(editBtn);
                        }
                        const delBtn = document.createElement("span");
                        delBtn.className = "msg-actions del";
                        delBtn.innerText = "[X]";
                        delBtn.onclick = () => deleteMessage(data.id);
                        meta.appendChild(delBtn);
                    }
                    
                    msgDiv.appendChild(meta);
                    wrapper.appendChild(msgDiv);
                    chatBox.appendChild(wrapper);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        window.sendMessage = async function() {
            const input = document.getElementById("messageInput");
            if (input.value.trim() !== "" && currentRoomId) {
                const text = input.value; input.value = "";
                const msgSubcollectionRef = collection(db, "rooms", currentRoomId, "messages");
                await addDoc(msgSubcollectionRef, { sender: myNick, text: text, type: "text", timestamp: Date.now() });
            }
        }

        window.sendImage = function(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = async function() {
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");
                    const max_size = 500;
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } }
                    else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    const compressedBase64 = canvas.toDataURL("image/jpeg", 0.7);
                    
                    const msgSubcollectionRef = collection(db, "rooms", currentRoomId, "messages");
                    await addDoc(msgSubcollectionRef, { sender: myNick, text: compressedBase64, type: "image", timestamp: Date.now() });
                }
            }
            reader.readAsDataURL(file);
            input.value = "";
        }

        window.showBigImg = function(src, sender) {
            document.getElementById("storyModalAuthor").innerText = `Zdjęcie od: ${sender}`;
            const cnt = document.getElementById("storyModalContent");
            cnt.innerHTML = `<img src="${src}">`;
            document.getElementById("storyModal").style.display = "flex";
        }

        async function editMessage(id, oldText) {
            const newText = prompt("Edytuj wiadomość:", oldText);
            if (newText && newText.trim() !== oldText) {
                await updateDoc(doc(db, "rooms", currentRoomId, "messages", id), { text: newText, edited: true });
            }
        }
        async function deleteMessage(id) { if (confirm("Usunąć tę wiadomość?")) await deleteDoc(doc(db, "rooms", currentRoomId, "messages", id)); }

        // WYBÓR GRUPY OSOB DLA RELACJI (Prywatne Stories / Skróty)
        window.createNewStory = function() {
            const targetsInput = prompt("Dla kogo ta relacja? Wpisz nicki znajomych oddzielając ich przecinkami (np. tomek, ania). Zostaw puste, by była dla WSZYSTKICH:");
            let allowedViewers = null;
            if (targetsInput && targetsInput.trim() !== "") {
                allowedViewers = targetsInput.split(",").map(u => u.trim().toLowerCase()).filter(u => u.length > 0);
                allowedViewers.push(myNick); // Sam też musisz ją widzieć
            }

            const type = confirm("Kliknij OK dla zdjęcia, ANULUJ dla tekstu.");
            if (type) {
                const inp = document.createElement("input"); inp.type = "file"; inp.accept = "image/*";
                inp.onchange = function() {
                    const file = inp.files[0]; if (!file) return;
                    const r = new FileReader(); r.onload = function(e) {
                        const img = new Image(); img.src = e.target.result;
                        img.onload = async function() {
                            const canvas = document.createElement("canvas"); const ctx = canvas.getContext("2d");
                            canvas.width = 400; canvas.height = 400; ctx.drawImage(img,0,0,400,400);
                            await addDoc(collection(db, "stories"), { 
                                sender: myNick, 
                                type: "image", 
                                content: canvas.toDataURL("image/jpeg",0.6), 
                                timestamp: Date.now(),
                                targetViewers: allowedViewers 
                            });
                        }
                    }; r.readAsDataURL(file);
                }; inp.click();
            } else {
                const txt = prompt("Wpisz treść relacji:");
                if (txt && txt.trim() !== "") {
                    addDoc(collection(db, "stories"), { 
                        sender: myNick, 
                        type: "text", 
                        content: txt, 
                        timestamp: Date.now(),
                        targetViewers: allowedViewers 
                    });
                }
            }
        }

        function listenToStories() {
            onSnapshot(collection(db, "stories"), (snapshot) => {
                const container = document.getElementById("storiesContainer");
                container.querySelectorAll(".story-circle:not(.add-story)").forEach(el => el.remove());
                const absoluteLimit = Date.now() - (24 * 60 * 60 * 1000); 
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.timestamp < absoluteLimit) return; 
                    
                    // Blokada prywatności: jeśli relacja ma określoną grupę osób i Cię tam nie ma -> nie zobaczysz jej
                    if (data.targetViewers && !data.targetViewers.includes(myNick)) return;
                    
                    const circle = document.createElement("div");
                    circle.className = "story-circle";
                    circle.onclick = () => {
                        document.getElementById("storyModalAuthor").innerText = `Relacja użytkownika: ${data.sender}`;
                        const cnt = document.getElementById("storyModalContent");
                        if (data.type === "image") cnt.innerHTML = `<img src="${data.content}">`;
                        else cnt.innerHTML = `<div class="story-text-content">${data.content}</div>`;
                        document.getElementById("storyModal").style.display = "flex";
                    }

                    if (data.type === "image") circle.innerHTML = `<img src="${data.content}">`;
                    else circle.innerHTML = `<div class="story-text-avatar">${data.sender.slice(0,3)}</div>`;
                    
                    container.appendChild(circle);
                });
            });
        }

        window.switchTab = function(tabName) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`panel-${tabName}`).classList.add('active');
            document.getElementById(`btn-tab-${tabName}`).classList.add('active');
            if (tabName === 'map') setTimeout(() => { map.invalidateSize(); }, 200);
        }

        // PANEL ADMINA DLA ogxldtg - Wyświetlanie daty rejestracji oraz urządzeń użytkowników
        function listenToAllUsersForAdmin() {
            onSnapshot(collection(db, "users"), (uSnap) => {
                onSnapshot(collection(db, "presence"), (pSnap) => {
                    const container = document.getElementById("adminUsersList"); container.innerHTML = "";
                    let active = {}; pSnap.forEach(d => active[d.id] = d.data().lastActive);
                    uSnap.forEach(uDoc => {
                        const username = uDoc.id; if(username === "ogxldtg") return;
                        const uData = uDoc.data();
                        const last = active[username] || 0;
                        const isOnline = (Date.now() - last) < 12000;
                        const isBanned = uData.isBanned || false;
                        
                        // Konwersja timestamp na czytelną datę rejestracji
                        const regDate = uData.createdAt ? new Date(uData.createdAt).toLocaleString('pl-PL') : "Brak danych";
                        const device = uData.deviceInfo || "Nieznany telefon / PC";

                        const row = document.createElement("div"); 
                        row.className = "admin-user-row";
                        row.innerHTML = `
                            <div class="admin-user-header">
                                <span>👤 <b>${username}</b> ${isBanned ? '<span style="color:#e03b3b; font-weight:bold;">[BAN]</span>':''}</span>
                                <div style="display:flex; align-items:center; gap:8px;">
                                    <span class="status-dot ${isOnline && !isBanned ? 'online':''}"></span>
                                    <button class="ban-btn ${isBanned?'unban':''}" onclick="toggleBan('${username}', ${isBanned})">${isBanned?'Odbanuj':'BAN'}</button>
                                </div>
                            </div>
                            <div class="admin-user-details">
                                <span>📅 <b>Dołączył:</b> ${regDate}</span>
                                <span>📱 <b>Urządzenie:</b> ${device}</span>
                            </div>
                        `;
                        container.appendChild(row);
                    });
                });
            });
        }

        window.toggleBan = async function(u, stat) { if (myNick === "ogxldtg" && confirm(`Zmienić status blokady dla ${u}?`)) await updateDoc(doc(db, "users", u), { isBanned: !stat }); }
        window.deletePin = async function(id) { if (myNick === "ogxldtg" && confirm("Usunąć pinezkę?")) await deleteDoc(doc(db, "pins", id)); }

        function initMap() {
            if (map) return;
            map = L.map('map').setView([52.237, 21.017], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: 'OSM' }).addTo(map);
            markersGroup = L.layerGroup().addTo(map);
            onSnapshot(collection(db, "pins"), (snap) => {
                markersGroup.clearLayers();
                snap.forEach(d => {
                    let pContent = `<b>${d.data().createdBy}</b>: ${d.data().label}`;
                    if (myNick === "ogxldtg") pContent += `<button class="delete-pin-btn" onclick="deletePin('${d.id}')">Usuń</button>`;
                    L.marker([d.data().lat, d.data().lng]).addTo(markersGroup).bindPopup(pContent);
                });
            });
            map.on('click', async (e) => {
                const txt = prompt("Opis pinezki:"); if (txt !== null) await addDoc(collection(db, "pins"), { lat: e.latlng.lat, lng: e.latlng.lng, label: txt, createdBy: myNick, timestamp: Date.now() });
            });
        }
    </script>
</body>
