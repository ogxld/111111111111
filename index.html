<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapApp - Nowa Generacja</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-surface: #121216;
            --bg-field: #1c1c24;
            --snap-yellow: #FFFC00;
            --snap-blue: #00b4ff;
            --snap-purple: #a445ff;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --border: rgba(255, 255, 255, 0.06);
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        
        /* Auth Screen */
        .auth-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; width: 100%; padding: 20px; background: radial-gradient(circle at top right, #1f1235 0%, var(--bg-main) 100%); position: fixed; z-index: 10000; }
        .auth-box { background: var(--bg-surface); border: 1px solid var(--border); padding: 40px 30px; border-radius: 32px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .auth-box h2 { font-size: 32px; font-weight: 800; margin-bottom: 24px; background: linear-gradient(45deg, var(--snap-yellow), #ff5e00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-links { margin-top: 20px; font-size: 14px; color: var(--text-muted); cursor: pointer; text-decoration: underline; transition: color 0.2s; }
        .auth-links:hover { color: var(--text-main); }
        
        /* App Container */
        .app-container { display: none; flex-direction: column; height: 100vh; width: 100%; max-width: 480px; background: var(--bg-main); border-left: 1px solid var(--border); border-right: 1px solid var(--border); position: relative; }
        
        /* Header */
        .header { background: var(--bg-surface); padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .profile-badge { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 6px; }
        .profile-badge b { color: var(--snap-blue); }
        .admin-tag { background: var(--snap-purple); font-size: 10px; padding: 2px 6px; border-radius: 8px; font-weight: 900; letter-spacing: 0.5px; }
        
        /* Search inputs */
        .search-box { display: flex; gap: 8px; background: var(--bg-field); padding: 4px; border-radius: 20px; border: 1px solid var(--border); }
        .search-box input { background: transparent; border: none; padding: 8px 16px; color: white; flex: 1; outline: none; font-size: 14px; }
        .search-box button { background: var(--snap-blue); color: black; font-weight: 700; border-radius: 16px; padding: 6px 16px; border: none; cursor: pointer; font-size: 13px; }

        /* SKRÓTY i STORIES (Snapchat Style) */
        .section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; padding: 12px 20px 4px 20px; }
        .stories-container { display: flex; gap: 14px; padding: 10px 20px 16px 20px; overflow-x: auto; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg-surface); }
        .stories-container::-webkit-scrollbar { display: none; }
        
        .story-wrapper { display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: var(--text-muted); text-align: center; width: 64px; shrink: 0; }
        .story-circle { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--snap-yellow); padding: 2px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: var(--bg-main); transition: transform 0.2s; }
        .story-circle:active { transform: scale(0.92); }
        .story-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .story-circle.add-story { border: 2px dashed #444; color: var(--snap-yellow); font-size: 24px; font-weight: 300; background: var(--bg-field); }
        .story-circle.add-shortcut { border: 2px dashed #444; color: var(--snap-purple); font-size: 20px; background: var(--bg-field); }
        .story-text-avatar { width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: white; text-transform: uppercase; }

        /* Inbox (Recent Chats) */
        .recent-chats { padding: 12px 20px; display: flex; gap: 10px; overflow-x: auto; background: var(--bg-main); min-height: 55px; }
        .recent-chats::-webkit-scrollbar { display: none; }
        .chat-chip { background: var(--bg-surface); border: 1px solid var(--border); padding: 8px 16px; border-radius: 24px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; color: #d1d1d6; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .chat-chip.active { background: var(--snap-blue); color: #000; font-weight: 700; border-color: transparent; box-shadow: 0 4px 12px rgba(0,180,255,0.3); }
        .chat-chip.group-chip { border-color: var(--snap-purple); }

        /* Chat View */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; background: linear-gradient(to bottom, var(--bg-main), #0f0f13); }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #2c2c35; border-radius: 2px; }
        
        .msg-wrapper { display: flex; flex-direction: column; max-width: 78%; width: fit-content; }
        .msg-wrapper.me { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.them { align-self: flex-start; align-items: flex-start; }
        
        .msg-sender { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; padding: 0 6px; font-weight: 700; }
        .msg { padding: 12px 18px; border-radius: 22px; word-break: break-word; font-size: 15px; position: relative; line-height: 1.4; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .msg img { max-width: 100%; border-radius: 14px; margin-top: 6px; display: block; cursor: pointer; }
        
        .msg.me { background: var(--snap-blue); color: black; font-weight: 500; border-bottom-right-radius: 4px; }
        .msg.them { background: var(--bg-surface); color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        
        .msg-meta { font-size: 10px; color: rgba(0,0,0,0.4); margin-top: 4px; display: flex; gap: 6px; justify-content: flex-end; font-weight: 600; }
        .msg.them .msg-meta { color: var(--text-muted); }
        .msg-actions { font-size: 11px; color: #0066cc; cursor: pointer; font-weight: 700; margin-left: 4px; }
        .msg-actions.del { color: #ff3b30; }

        /* Input Area */
        .input-area { padding: 16px; background: var(--bg-surface); display: flex; gap: 12px; border-top: 1px solid var(--border); align-items: center; }
        .input-wrapper { flex: 1; display: flex; align-items: center; background: var(--bg-field); border-radius: 24px; padding-right: 6px; border: 1px solid var(--border); }
        .input-wrapper input { background: transparent; border: none; color: white; padding: 14px 20px; font-size: 15px; flex: 1; outline: none; }
        
        .icon-btn { background: var(--bg-field); border: 1px solid var(--border); color: white; width: 48px; height: 48px; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; shrink: 0; }
        .icon-btn:hover { background: #262632; }
        .send-btn { background: var(--snap-yellow); color: black; border: none; padding: 10px 20px; border-radius: 20px; font-weight: 700; cursor: pointer; font-size: 14px; }

        /* Tabs & Navigation */
        .tab-bar { display: flex; background: var(--bg-surface); border-top: 1px solid var(--border); min-height: 65px; padding-bottom:env(safe-area-inset-bottom); }
        .tab-btn { flex: 1; background: none; border: none; color: var(--text-muted); font-size: 12px; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
        .tab-btn.active { color: var(--snap-yellow); }
        
        .panel { flex: 1; display: none; flex-direction: column; overflow: hidden; background: var(--bg-main); }
        .panel.active { display: flex; }
        #map { width: 100%; flex: 1; z-index: 1; }

        /* Admin Dashboard UI */
        .admin-list { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
        .admin-user-row { background: var(--bg-surface); padding: 18px; border-radius: 20px; display: flex; flex-direction: column; gap: 10px; border: 1px solid var(--border); }
        .admin-user-header { display: flex; justify-content: space-between; align-items: center; }
        .admin-user-details { font-size: 12px; color: var(--text-muted); background: var(--bg-field); padding: 10px; border-radius: 12px; display: flex; flex-direction: column; gap: 4px; border: 1px solid rgba(255,255,255,0.02); }
        .status-dot { width: 8px; height: 8px; background: #3a3a3a; border-radius: 50%; display: inline-block; }
        .status-dot.online { background: #34c759; box-shadow: 0 0 10px #34c759; }
        .ban-btn { background: #ff3b30; font-size: 11px; padding: 6px 14px; border-radius: 14px; font-weight: 700; color: white; border: none; cursor: pointer; }
        .ban-btn.unban { background: #34c759; }

        /* Story View Modal */
        .story-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .story-modal img { max-width: 100%; max-height: 80vh; border-radius: 20px; }
        .story-modal .story-text-content { background: var(--bg-surface); padding: 40px; border-radius: 24px; width: 85%; max-width: 340px; text-align: center; font-size: 22px; font-weight: 700; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .story-top-info { position: absolute; top: 30px; left: 20px; font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 8px; }

        input[type="text"], input[type="password"] {
            background: var(--bg-field); border: 1px solid var(--border); color: white; padding: 14px 20px; border-radius: 20px; font-size: 15px; outline: none;
        }
        button:active { transform: scale(0.97); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

    <!-- LOGOWANIE -->
    <div class="auth-screen" id="loginScreen">
        <div class="auth-box">
            <h2>SnapApp 👻</h2>
            <input type="text" id="loginUsername" placeholder="Nazwa użytkownika..." style="width:100%; margin-bottom:12px;">
            <input type="password" id="loginPassword" placeholder="Hasło..." style="width:100%; margin-bottom:16px;">
            <button onclick="handleLogin()" style="width: 100%; background: var(--snap-yellow); color: black; font-weight:700; padding:14px; border-radius:20px; border:none; cursor:pointer;">Zaloguj się</button>
            <div class="auth-links" onclick="toggleAuthScreens(false)">Stwórz nowe konto</div>
        </div>
    </div>

    <!-- REJESTRACJA -->
    <div class="auth-screen" id="registerScreen" style="display: none;">
        <div class="auth-box">
            <h2>Dołącz teraz ✨</h2>
            <input type="text" id="regUsername" placeholder="Wybierz nick..." style="width:100%; margin-bottom:12px;">
            <input type="password" id="regPassword" placeholder="Wymyśl silne hasło..." style="width:100%; margin-bottom:16px;">
            <button onclick="handleRegister()" style="width: 100%; background: white; color: black; font-weight:700; padding:14px; border-radius:20px; border:none; cursor:pointer;">Zarejestruj się</button>
            <div class="auth-links" onclick="toggleAuthScreens(true)">Masz już konto? Zaloguj</div>
        </div>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="app-container" id="appContainer">
        
        <!-- PANEL CZATU / STORIES -->
        <div id="panel-chat" class="panel active">
            <div class="header">
                <div class="header-top">
                    <div class="profile-badge">👻 <span>Profil: <b id="displayMyName"></b></span> <span id="adminBadge" class="admin-tag" style="display: none;">ADMIN</span></div>
                    <button onclick="location.reload()" style="padding: 6px 12px; font-size: 12px; background: var(--bg-field); border: 1px solid var(--border); color:white; border-radius:12px; cursor:pointer;">Wyloguj</button>
                </div>
                <div class="search-box">
                    <input type="text" id="searchUser" placeholder="Szukaj znajomego po nicku...">
                    <button onclick="startChatWithSearchedUser()">Czat</button>
                </div>
            </div>

            <!-- STORIES + SKRÓTY (SNAPCHAT LOOK) -->
            <div class="section-title">Relacje i Skróty</div>
            <div class="stories-container" id="storiesContainer">
                <div class="story-wrapper">
                    <div class="story-circle add-story" onclick="createNewStory()">+</div>
                    <span>Dodaj</span>
                </div>
                <div class="story-wrapper">
                    <div class="story-circle add-shortcut" onclick="createNewShortcut()">⚙️</div>
                    <span>Skrót</span>
                </div>
            </div>

            <!-- SKRZYNKA CZATÓW -->
            <div class="section-title">Rozmowy</div>
            <div class="recent-chats" id="recentChats"></div>

            <!-- AKTYWNE OKNO CZATU -->
            <div style="background: var(--bg-surface); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);" id="chatSubHeader">
                <span id="currentChatTitle" style="font-weight:700; color:#fff; font-size:14px;">Wybierz czat</span>
                <button id="createGroupBtn" style="display:none; padding:6px 12px; font-size:11px; background:var(--snap-purple); border:none; border-radius:12px; font-weight:700; color:white; cursor:pointer;" onclick="convertChatToGroup()">+ Stwórz grupę</button>
            </div>

            <div id="chat-box">
                <div style="text-align: center; color: var(--text-muted); margin-top: 40px; font-size:14px;">Wybierz znajomego, aby rozpocząć snapowanie!</div>
            </div>

            <!-- INPUT AREA -->
            <div class="input-area" id="inputArea" style="display: none;">
                <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="sendImage(this)">
                <button class="icon-btn" onclick="document.getElementById('imageInput').click()">📸</button>
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Wyślij czata...">
                    <button class="send-btn" onclick="sendMessage()">Wyślij</button>
                </div>
            </div>
        </div>

        <!-- PANEL MAPY -->
        <div id="panel-map" class="panel">
            <div style="background: var(--bg-surface); padding: 12px; text-align: center; font-size: 13px; color: var(--text-muted); border-bottom:1px solid var(--border);">Kliknij na mapę SnapMap, aby zostawić pinezkę.</div>
            <div id="map"></div>
        </div>

        <!-- PANEL ADMINA -->
        <div id="panel-admin" class="panel">
            <div style="background: var(--bg-surface); padding: 16px; text-align: center; font-weight: 800; color: var(--snap-purple); border-bottom: 1px solid var(--border); letter-spacing:1px;">PANEL INWIGILACJI</div>
            <div class="admin-list" id="adminUsersList"></div>
        </div>

        <!-- NAVBAR DOLNY -->
        <div class="tab-bar">
            <button class="tab-btn active" id="btn-tab-chat" onclick="switchTab('chat')">💬 <span>Czaty</span></button>
            <button class="tab-btn" id="btn-tab-map" onclick="switchTab('map')">🗺️ <span>SnapMap</span></button>
            <button class="tab-btn" id="btn-tab-admin" onclick="switchTab('admin')" style="display: none;">👑 <span>Admin</span></button>
        </div>
    </div>

    <!-- MODAL STORIES -->
    <div class="story-modal" id="storyModal" onclick="this.style.display='none'">
        <div class="story-top-info"><span style="font-size:20px;">👻</span> <span id="storyModalAuthor">Autor</span></div>
        <div id="storyModalContent" style="width: 100%; display: flex; justify-content: center; align-items: center;"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, getDoc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { projectId: "apka-32bf2" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let myNick = "";
        let currentRoomId = "";
        let isGroupRoom = false;
        let activeChatParticipants = [];
        let unsubscribeMessages = null;
        let activeInboxRooms = [];
        let map, markersGroup;
        let shortcutsList = [];

        function getDeviceModel() {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) {
                const match = ua.match(/Android\s([0-9\.]+);.*?(Build\/|\s)([A-Z0-9_-]+)/i);
                return match ? `Android (Model: ${match[3]})` : "Android Phone";
            }
            if (/iPhone|iPad|iPod/i.test(ua)) return "iPhone / iOS Device";
            if (/Windows/i.test(ua)) return "Windows PC";
            if (/Macintosh/i.test(ua)) return "Apple Mac";
            return "Urządzenie Przeglądarkowe";
        }

        function hashPassword(string) { return CryptoJS.SHA256(string).toString(); }
        window.toggleAuthScreens = function(showLogin) {
            document.getElementById("loginScreen").style.display = showLogin ? "flex" : "none";
            document.getElementById("registerScreen").style.display = showLogin ? "none" : "flex";
        }

        window.handleRegister = async function() {
            const user = document.getElementById("regUsername").value.trim().toLowerCase();
            const pass = document.getElementById("regPassword").value.trim();
            if(!user || !pass) return alert("Uzupełnij pola!");
            const userRef = doc(db, "users", user);
            const userSnap = await getDoc(userRef);
            if(userSnap.exists()) return alert("Nick zajęty!");
            
            await setDoc(userRef, { 
                password: hashPassword(pass), 
                isBanned: false, 
                createdAt: Date.now(),
                deviceInfo: getDeviceModel()
            });
            alert("Zarejestrowano!"); toggleAuthScreens(true);
        }

        window.handleLogin = async function() {
            const user = document.getElementById("loginUsername").value.trim().toLowerCase();
            const pass = document.getElementById("loginPassword").value.trim();
            if(!user || !pass) return alert("Uzupełnij pola!");
            const userRef = doc(db, "users", user);
            const userSnap = await getDoc(userRef);
            if(!userSnap.exists() || userSnap.data().password !== hashPassword(pass)) return alert("Błędne dane!");
            if(userSnap.data().isBanned) return alert("Zbanowany!");

            myNick = user;
            await updateDoc(userRef, { deviceInfo: getDeviceModel() });

            document.getElementById("displayMyName").innerText = myNick;
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("appContainer").style.display = "flex";

            if(myNick === "ogxldtg") {
                document.getElementById("adminBadge").style.display = "inline";
                document.getElementById("btn-tab-admin").style.display = "flex";
                listenToAllUsersForAdmin();
            } else {
                onSnapshot(doc(db, "users", myNick), (docSnap) => { if (docSnap.exists() && docSnap.data().isBanned) location.reload(); });
            }

            updatePresence(); setInterval(updatePresence, 4000);
            listenToInbox();
            listenToShortcuts(); // Nowość: ładowanie skrótów ze Snapa
            initMap();
        }

        async function updatePresence() { if (myNick) await setDoc(doc(db, "presence", myNick), { lastActive: Date.now() }); }

        // CZAT INBOX
        function listenToInbox() {
            onSnapshot(collection(db, "rooms"), (snapshot) => {
                activeInboxRooms = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.participants && data.participants.includes(myNick)) {
                        activeInboxRooms.push({ id: doc.id, ...data });
                    }
                });
                renderInboxUI();
            });
        }

        function renderInboxUI() {
            const container = document.getElementById("recentChats");
            container.innerHTML = "";
            activeInboxRooms.forEach(room => {
                const chip = document.createElement("div");
                chip.className = `chat-chip ${room.id === currentRoomId ? 'active' : ''} ${room.isGroup ? 'group-chip' : ''}`;
                let title = room.isGroup ? `👥 ${room.groupName}` : `👤 ${room.participants.find(p => p !== myNick)}`;
                chip.innerText = title;
                chip.onclick = () => openChatRoom(room.id, room.isGroup, room.participants, room.groupName || title);
                container.appendChild(chip);
            });
        }

        window.startChatWithSearchedUser = async function() {
            const target = document.getElementById("searchUser").value.trim().toLowerCase();
            if (!target || target === myNick) return alert("Błędny nick!");
            const userRef = doc(db, "users", target);
            const userSnap = await getDoc(userRef);
            if(!userSnap.exists()) return alert("Nie znaleziono użytkownika!");

            const roomId = [myNick, target].sort().join("_VS_");
            await setDoc(doc(db, "rooms", roomId), { participants: [myNick, target], isGroup: false });
            document.getElementById("searchUser").value = "";
            openChatRoom(roomId, false, [myNick, target], target);
        }

        function openChatRoom(roomId, isGroup, participants, title) {
            currentRoomId = roomId;
            isGroupRoom = isGroup;
            activeChatParticipants = participants;
            document.getElementById("currentChatTitle").innerText = isGroup ? `Grupa: ${title}` : `Rozmowa z: ${title}`;
            document.getElementById("createGroupBtn").style.display = isGroup ? "none" : "block";
            document.getElementById("inputArea").style.display = "flex";
            renderInboxUI();
            listenToMessages();
        }

        window.convertChatToGroup = async function() {
            if (isGroupRoom) return;
            const otherUser = activeChatParticipants.find(p => p !== myNick);
            const inputUsers = prompt("Wpisz nicki innych użytkowników po przecinku:");
            if (!inputUsers) return;
            let parsed = inputUsers.split(",").map(u => u.trim().toLowerCase()).filter(u => u.length > 0);
            let finalParticipants = Array.from(new Set([myNick, otherUser, ...parsed]));
            const groupName = prompt("Nazwa grupy:");
            if (!groupName) return;

            const newGroupId = "group_" + Date.now();
            await setDoc(doc(db, "rooms", newGroupId), { id: newGroupId, participants: finalParticipants, isGroup: true, groupName: groupName, createdBy: myNick });
            openChatRoom(newGroupId, true, finalParticipants, groupName);
        }

        function listenToMessages() {
            if (unsubscribeMessages) unsubscribeMessages();
            const msgSubcollectionRef = collection(db, "rooms", currentRoomId, "messages");
            unsubscribeMessages = onSnapshot(msgSubcollectionRef, (snapshot) => {
                const chatBox = document.getElementById("chat-box");
                chatBox.innerHTML = "";
                let messages = [];
                snapshot.forEach(doc => messages.push({ id: doc.id, ...doc.data() }));
                messages.sort((a,b) => (a.timestamp || 0) - (b.timestamp || 0));
                
                messages.forEach(data => {
                    const wrapper = document.createElement("div");
                    wrapper.className = `msg-wrapper ${data.sender === myNick ? 'me' : 'them'}`;
                    const senderLabel = document.createElement("div");
                    senderLabel.className = "msg-sender";
                    senderLabel.innerText = data.sender;
                    wrapper.appendChild(senderLabel);

                    const msgDiv = document.createElement("div");
                    msgDiv.className = data.sender === myNick ? "msg me" : "msg them";
                    
                    if (data.type === "image") {
                        const img = document.createElement("img");
                        img.src = data.text;
                        img.onclick = () => window.showBigImg(data.text, data.sender);
                        msgDiv.appendChild(img);
                    } else {
                        const txt = document.createElement("span");
                        txt.innerText = data.text + (data.edited ? " (edytowano)" : "");
                        msgDiv.appendChild(txt);
                    }

                    const timeStr = data.timestamp ? new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";
                    const meta = document.createElement("div");
                    meta.className = "msg-meta";
                    meta.innerText = timeStr;

                    if (data.sender === myNick) {
                        if (data.type !== "image") {
                            const editBtn = document.createElement("span");
                            editBtn.className = "msg-actions"; editBtn.innerText = "Edytuj";
                            editBtn.onclick = () => editMessage(data.id, data.text);
                            meta.appendChild(editBtn);
                        }
                        const delBtn = document.createElement("span");
                        delBtn.className = "msg-actions del"; delBtn.innerText = "Usuń";
                        delBtn.onclick = () => deleteMessage(data.id);
                        meta.appendChild(delBtn);
                    }
                    msgDiv.appendChild(meta); wrapper.appendChild(msgDiv); chatBox.appendChild(wrapper);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        window.sendMessage = async function() {
            const input = document.getElementById("messageInput");
            if (input.value.trim() !== "" && currentRoomId) {
                const text = input.value; input.value = "";
                await addDoc(collection(db, "rooms", currentRoomId, "messages"), { sender: myNick, text: text, type: "text", timestamp: Date.now() });
            }
        }

        window.sendImage = function(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image(); img.src = e.target.result;
                img.onload = async function() {
                    const canvas = document.createElement("canvas"); const ctx = canvas.getContext("2d");
                    const max_size = 500; let width = img.width, height = img.height;
                    if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } }
                    else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                    canvas.width = width; canvas.height = height; ctx.drawImage(img, 0, 0, width, height);
                    await addDoc(collection(db, "rooms", currentRoomId, "messages"), { sender: myNick, text: canvas.toDataURL("image/jpeg", 0.7), type: "image", timestamp: Date.now() });
                }
            }
            reader.readAsDataURL(file); input.value = "";
        }

        window.showBigImg = function(src, sender) {
            document.getElementById("storyModalAuthor").innerText = `Zdjęcie od: ${sender}`;
            document.getElementById("storyModalContent").innerHTML = `<img src="${src}">`;
            document.getElementById("storyModal").style.display = "flex";
        }

        async function editMessage(id, oldText) {
            const newText = prompt("Edytuj:", oldText);
            if (newText && newText.trim() !== oldText) await updateDoc(doc(db, "rooms", currentRoomId, "messages", id), { text: newText, edited: true });
        }
        async function deleteMessage(id) { if (confirm("Usunąć?")) await deleteDoc(doc(db, "rooms", currentRoomId, "messages", id)); }

        // ==================== NOWY SYSTEM: SKRÓTY A LA SNAPCHAT ====================
        
        // 1. Tworzenie stałego skrótu (grupy odbiorców oznaczonych ikoną EMOJI)
        window.createNewShortcut = async function() {
            const emoji = prompt("Wybierz jedno EMOJI jako ikonę skrótu (np. 🔥, 👻, 👑, ❤️):");
            if (!emoji || emoji.trim().length === 0) return alert("Musisz podać emoji!");
            
            const usersInput = prompt("Wpisz nicki znajomych przypisanych do tego skrótu (oddziel przecinkami):");
            if (!usersInput) return;
            
            let parsedUsers = usersInput.split(",").map(u => u.trim().toLowerCase()).filter(u => u.length > 0);
            if (parsedUsers.length === 0) return alert("Skrót musi mieć przypisanego choć jednego znajomego!");

            // Zapisujemy skrót w profilu usera
            const shortcutId = "shortcut_" + Date.now();
            await setDoc(doc(db, "users", myNick, "shortcuts", shortcutId), {
                id: shortcutId,
                emoji: emoji.trim(),
                viewers: parsedUsers
            });
            alert(`Stworzono skrót ${emoji}! Teraz możesz szybko wysyłać do nich Relacje.`);
        }

        // Pobieranie skrótów z Firebase i nasłuchiwanie
        function listenToShortcuts() {
            onSnapshot(collection(db, "users", myNick, "shortcuts"), (snap) => {
                shortcutsList = [];
                snap.forEach(doc => shortcutsList.push(doc.data()));
                listenToStories(); // Przeładuj stories uwzględniając nowe skróty
            });
        }

        // 2. Dodawanie relacji (Wybór grupy tradycyjnej LUB snapchatowego skrótu)
        window.createNewStory = function() {
            let targetViewers = null;

            if (shortcutsList.length > 0) {
                let msg = "Wybierz jak chcesz wysłać relację:\n0 - Dla wszystkich publicznie\n";
                shortcutsList.forEach((s, idx) => {
                    msg += `${idx + 1} - Skrót ${s.emoji} (Odbiorcy: ${s.viewers.join(", ")})\n`;
                });
                
                const choice = prompt(msg);
                if (choice === null) return;
                const num = parseInt(choice);
                if (!isNaN(num) && num > 0 && num <= shortcutsList.length) {
                    const selectedShortcut = shortcutsList[num - 1];
                    targetViewers = [...selectedShortcut.viewers, myNick]; // Przypisujemy odbiorców ze skrótu snapchata
                }
            } else {
                const legacy = prompt("Wpisz nicki znajomych po przecinku (zostaw puste, aby była dla WSZYSTKICH):");
                if (legacy && legacy.trim() !== "") {
                    targetViewers = legacy.split(",").map(u => u.trim().toLowerCase()).filter(u => u.length > 0);
                    targetViewers.push(myNick);
                }
            }

            const isImage = confirm("Kliknij OK, aby wrzucić FOTĘ, kliknij ANULUJ, aby wrzucić TEKST.");
            if (isImage) {
                const inp = document.createElement("input"); inp.type = "file"; inp.accept = "image/*";
                inp.onchange = function() {
                    const file = inp.files[0]; if (!file) return;
                    const r = new FileReader(); r.onload = function(e) {
                        const img = new Image(); img.src = e.target.result;
                        img.onload = async function() {
                            const canvas = document.createElement("canvas"); const ctx = canvas.getContext("2d");
                            canvas.width = 400; canvas.height = 400; ctx.drawImage(img,0,0,400,400);
                            await addDoc(collection(db, "stories"), { 
                                sender: myNick, type: "image", content: canvas.toDataURL("image/jpeg",0.6), timestamp: Date.now(), targetViewers: targetViewers 
                            });
                        }
                    }; r.readAsDataURL(file);
                }; inp.click();
            } else {
                const txt = prompt("Wpisz tekst Twojej relacji:");
                if (txt && txt.trim() !== "") {
                    addDoc(collection(db, "stories"), { sender: myNick, type: "text", content: txt, timestamp: Date.now(), targetViewers: targetViewers });
                }
            }
        }

        // Renderowanie Stories na pasku górnym
        function listenToStories() {
            onSnapshot(collection(db, "stories"), (snapshot) => {
                const container = document.getElementById("storiesContainer");
                // Czyścimy stare relacje, zostawiamy tylko przyciski funkcyjne
                container.querySelectorAll(".story-wrapper:not(:nth-child(1)):not(:nth-child(2))").forEach(el => el.remove());
                const timeLimit = Date.now() - (24 * 60 * 60 * 1000); 
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.timestamp < timeLimit) return; 
                    if (data.targetViewers && !data.targetViewers.includes(myNick)) return; // Prywatność skrótów
                    
                    const wrapper = document.createElement("div");
                    wrapper.className = "story-wrapper";

                    const circle = document.createElement("div");
                    circle.className = "story-circle";
                    circle.onclick = () => {
                        document.getElementById("storyModalAuthor").innerText = data.sender;
                        const cnt = document.getElementById("storyModalContent");
                        if (data.type === "image") cnt.innerHTML = `<img src="${data.content}">`;
                        else cnt.innerHTML = `<div class="story-text-content">${data.content}</div>`;
                        document.getElementById("storyModal").style.display = "flex";
                    }

                    if (data.type === "image") circle.innerHTML = `<img src="${data.content}">`;
                    else circle.innerHTML = `<div class="story-text-avatar">${data.sender.slice(0,3)}</div>`;
                    
                    const nameLabel = document.createElement("span");
                    nameLabel.innerText = data.sender === myNick ? "Mój Snap" : data.sender;

                    wrapper.appendChild(circle);
                    wrapper.appendChild(nameLabel);
                    container.appendChild(wrapper);
                });
            });
        }

        window.switchTab = function(tabName) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`panel-${tabName}`).classList.add('active');
            document.getElementById(`btn-tab-${tabName}`).classList.add('active');
            if (tabName === 'map') setTimeout(() => { map.invalidateSize(); }, 200);
        }

        // PANEL INWIGILACJI ADMINA (ogxldtg)
        function listenToAllUsersForAdmin() {
            onSnapshot(collection(db, "users"), (uSnap) => {
                onSnapshot(collection(db, "presence"), (pSnap) => {
                    const container = document.getElementById("adminUsersList"); container.innerHTML = "";
                    let active = {}; pSnap.forEach(d => active[d.id] = d.data().lastActive);
                    uSnap.forEach(uDoc => {
                        const username = uDoc.id; if(username === "ogxldtg") return;
                        const uData = uDoc.data();
                        const last = active[username] || 0;
                        const isOnline = (Date.now() - last) < 12000;
                        const isBanned = uData.isBanned || false;
                        
                        const regDate = uData.createdAt ? new Date(uData.createdAt).toLocaleString('pl-PL') : "Brak danych";
                        const device = uData.deviceInfo || "Nieznane urządzenie";

                        const row = document.createElement("div"); 
                        row.className = "admin-user-row";
                        row.innerHTML = `
                            <div class="admin-user-header">
                                <span>👤 <b style="color:var(--snap-blue); font-size:15px;">${username}</b> ${isBanned ? '<span style="color:#ff3b30; font-weight:bold;">[ZBANOWANY]</span>':''}</span>
                                <div style="display:flex; align-items:center; gap:8px;">
                                    <span class="status-dot ${isOnline && !isBanned ? 'online':''}"></span>
                                    <button class="ban-btn ${isBanned?'unban':''}" onclick="toggleBan('${username}', ${isBanned})">${isBanned?'Odbanuj':'Zbanuj'}</button>
                                </div>
                            </div>
                            <div class="admin-user-details">
                                <span>📅 <b>Konto założone:</b> ${regDate}</span>
                                <span>📱 <b>Wykryty sprzęt:</b> ${device}</span>
                            </div>
                        `;
                        container.appendChild(row);
                    });
                });
            });
        }

        window.toggleBan = async function(u, stat) { if (myNick === "ogxldtg" && confirm(`Zmienić ban dla ${u}?`)) await updateDoc(doc(db, "users", u), { isBanned: !stat }); }
        window.deletePin = async function(id) { if (myNick === "ogxldtg" && confirm("Usunąć pinezkę?")) await deleteDoc(doc(db, "pins", id)); }

        function initMap() {
            if (map) return;
            map = L.map('map').setView([52.237, 21.017], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: 'OSM' }).addTo(map);
            markersGroup = L.layerGroup().addTo(map);
            onSnapshot(collection(db, "pins"), (snap) => {
                markersGroup.clearLayers();
                snap.forEach(d => {
                    let pContent = `<b>${d.data().createdBy}</b>: ${d.data().label}`;
                    if (myNick === "ogxldtg") pContent += `<button class="delete-pin-btn" onclick="deletePin('${d.id}')">Usuń</button>`;
                    L.marker([d.data().lat, d.data().lng]).addTo(markersGroup).bindPopup(pContent);
                });
            });
            map.on('click', async (e) => {
                const txt = prompt("Wpisz status pinezki:"); if (txt !== null) await addDoc(collection(db, "pins"), { lat: e.latlng.lat, lng: e.latlng.lng, label: txt, createdBy: myNick, timestamp: Date.now() });
            });
        }
    </script>
</body>
