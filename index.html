<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapApp - Ghost Edition v2.1</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-main: #060608;
            --bg-surface: #0e0e12;
            --bg-field: #16161f;
            --snap-yellow: #FFFC00;
            --snap-blue: #00f0ff;
            --snap-purple: #bf55ec;
            --text-main: #f5f5f7;
            --text-muted: #6e6e73;
            --border: rgba(255, 255, 255, 0.08);
            --gradient-accent: linear-gradient(135deg, #FFFC00 0%, #ff007f 100%);
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        
        /* Ekran logowania/rejestracji */
        .auth-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; width: 100%; padding: 20px; background: radial-gradient(circle at 80% 20%, #1a0b2e 0%, var(--bg-main) 100%); position: fixed; z-index: 10000; }
        .auth-box { background: rgba(14, 14, 18, 0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); padding: 40px 30px; border-radius: 28px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        .auth-box h2 { font-size: 36px; font-weight: 900; margin-bottom: 28px; background: var(--gradient-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }
        .auth-links { margin-top: 22px; font-size: 13px; color: var(--text-muted); cursor: pointer; text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .auth-links:hover { color: var(--snap-yellow); }
        
        /* Kontener główny aplikacji */
        .app-container { display: none; flex-direction: column; height: 100vh; width: 100%; max-width: 460px; background: var(--bg-main); border-left: 1px solid var(--border); border-right: 1px solid var(--border); position: relative; }
        
        /* Nagłówek */
        .header { background: rgba(14, 14, 18, 0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 14px; position: relative; z-index: 10; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .profile-badge { font-weight: 700; font-size: 17px; display: flex; align-items: center; gap: 8px; letter-spacing: -0.3px; }
        .profile-badge b { color: var(--snap-yellow); background: rgba(255, 252, 0, 0.1); padding: 2px 8px; border-radius: 8px; }
        
        /* Wyszukiwarka */
        .search-box { display: flex; gap: 8px; background: var(--bg-field); padding: 5px; border-radius: 14px; border: 1px solid var(--border); }
        .search-box input { background: transparent; border: none; padding: 10px 14px; color: white; flex: 1; outline: none; font-size: 14px; }
        .search-box button { background: var(--text-main); color: black; font-weight: 700; border-radius: 10px; padding: 0 18px; border: none; cursor: pointer; font-size: 13px; transition: opacity 0.2s; }
        .search-box button:hover { opacity: 0.9; }

        /* Sekcje tytułowe */
        .section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1.5px; padding: 16px 20px 6px 20px; }
        
        /* Relacje i Skróty */
        .stories-container { display: flex; gap: 14px; padding: 8px 20px 16px 20px; overflow-x: auto; align-items: center; background: var(--bg-main); }
        .stories-container::-webkit-scrollbar { display: none; }
        
        .story-wrapper { display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 11px; font-weight: 600; color: #fff; text-align: center; width: 62px; shrink: 0; }
        .story-circle { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--snap-yellow); padding: 3px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: var(--bg-main); transition: all 0.2s ease; }
        .story-circle:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(255, 252, 0, 0.2); }
        .story-circle.add-story { border: 2px dashed #3a3a4a; color: var(--snap-yellow); font-size: 22px; background: var(--bg-surface); }
        .story-circle.add-shortcut { border: 2px dashed #3a3a4a; color: var(--snap-purple); font-size: 18px; background: var(--bg-surface); }
        .story-text-avatar { width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, #2c1654 0%, #004f7c 100%); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: white; text-transform: uppercase; }

        /* Lista Rozmów */
        .recent-chats { padding: 4px 20px 12px 20px; display: flex; gap: 8px; overflow-x: auto; min-height: 50px; }
        .recent-chats::-webkit-scrollbar { display: none; }
        .chat-chip { background: var(--bg-surface); border: 1px solid var(--border); padding: 10px 18px; border-radius: 16px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; color: #e5e5ea; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .chat-chip:hover { background: var(--bg-field); }
        .chat-chip.active { background: var(--text-main); color: black; font-weight: 700; border-color: transparent; }

        /* Widok Czatu */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; background: #060608; border-top: 1px solid var(--border); }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; width: fit-content; }
        .msg-wrapper.me { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.them { align-self: flex-start; align-items: flex-start; }
        
        .msg { padding: 12px 18px; border-radius: 18px; font-size: 15px; position: relative; line-height: 1.45; }
        .msg.me { background: var(--bg-surface); color: var(--text-main); border: 1px solid var(--border); border-bottom-right-radius: 4px; }
        .msg.them { background: var(--bg-field); color: var(--text-main); border: 1px solid rgba(255,255,255,0.03); border-bottom-left-radius: 4px; }
        
        /* Blur dla wiadomości */
        .ghost-blur { filter: blur(5px); transition: filter 0.15s ease; user-select: none; -webkit-user-select: none; cursor: pointer; }
        .ghost-blur:active { filter: blur(0px); }

        /* Panel wprowadzania wiadomości */
        .input-area { padding: 16px 20px; background: var(--bg-surface); display: flex; gap: 10px; border-top: 1px solid var(--border); align-items: center; }
        .input-wrapper { flex: 1; display: flex; align-items: center; background: var(--bg-field); border-radius: 14px; padding-right: 6px; border: 1px solid var(--border); }
        .input-wrapper input { background: transparent; border: none; color: white; padding: 12px 16px; font-size: 15px; flex: 1; outline: none; }
        .icon-btn { background: var(--bg-field); border: 1px solid var(--border); color: white; width: 44px; height: 44px; border-radius: 12px; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; shrink: 0; transition: background 0.2s; }
        .icon-btn:hover { background: rgba(255,255,255,0.05); }
        .send-btn { background: var(--snap-yellow); color: black; border: none; padding: 8px 16px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 13px; }

        /* Paski nawigacyjne dolne */
        .tab-bar { display: flex; background: var(--bg-surface); border-top: 1px solid var(--border); min-height: 68px; padding-bottom: env(safe-area-inset-bottom); }
        .tab-btn { flex: 1; background: none; border: none; color: var(--text-muted); font-size: 11px; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; transition: color 0.2s; }
        .tab-btn.active { color: var(--snap-yellow); }
        .panel { flex: 1; display: none; flex-direction: column; overflow: hidden; background: var(--bg-main); }
        .panel.active { display: flex; }
        #map { width: 100%; flex: 1; background: #060608; }

        /* Modal relacji */
        .story-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4,4,6,0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 99999; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .story-modal .story-text-content { background: var(--bg-surface); border: 1px solid var(--border); padding: 50px 30px; border-radius: 24px; width: 90%; max-width: 350px; text-align: center; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .story-top-info { position: absolute; top: 30px; left: 24px; right: 24px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; z-index: 100000; }
        .delete-story-btn { background: rgba(255, 59, 48, 0.15); color: #ff453a; border: 1px solid rgba(255, 59, 48, 0.3); padding: 8px 16px; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .delete-story-btn:hover { background: #ff3b30; color: white; }

        input[type="text"], input[type="password"] { background: var(--bg-field); border: 1px solid var(--border); color: white; padding: 12px 16px; border-radius: 14px; font-size: 15px; outline: none; transition: border-color 0.2s; }
        input[type="text"]:focus, input[type="password"]:focus { border-color: rgba(255,255,255,0.2); }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <!-- EKRAN LOGOWANIA -->
    <div class="auth-screen" id="loginScreen">
        <div class="auth-box">
            <h2>SnapApp 👻</h2>
            <input type="text" id="loginUsername" placeholder="Nazwa użytkownika" style="width:100%; margin-bottom:12px;">
            <input type="password" id="loginPassword" placeholder="Hasło" style="width:100%; margin-bottom:18px;">
            <button onclick="window.handleLogin()" style="width: 100%; background: var(--snap-yellow); color: black; font-weight:800; padding:14px; border-radius:14px; border:none; cursor:pointer; font-size:15px;">Zaloguj się</button>
            <div class="auth-links" onclick="window.toggleAuthScreens(false)">Nie masz konta? Zarejestruj się</div>
        </div>
    </div>

    <!-- EKRAN REJESTRACJI -->
    <div class="auth-screen" id="registerScreen" style="display: none;">
        <div class="auth-box">
            <h2>Utwórz konto ✨</h2>
            <input type="text" id="regUsername" placeholder="Twój unikalny nick" style="width:100%; margin-bottom:12px;">
            <input type="password" id="regPassword" placeholder="Hasło profilu" style="width:100%; margin-bottom:18px;">
            <button onclick="window.handleRegister()" style="width: 100%; background: white; color: black; font-weight:800; padding:14px; border-radius:14px; border:none; cursor:pointer; font-size:15px;">Zarejestruj się</button>
            <div class="auth-links" onclick="window.toggleAuthScreens(true)">Masz już profil? Zaloguj się</div>
        </div>
    </div>

    <!-- KONTENER APLIKACJI -->
    <div class="app-container" id="appContainer">
        <div id="panel-chat" class="panel active">
            <div class="header">
                <div class="header-top">
                    <div class="profile-badge">👻 <span id="profileNameWrapper">Profil: <b id="displayMyName">Ładowanie...</b></span></div>
                    <button onclick="location.reload()" style="padding: 8px 14px; font-size: 12px; font-weight:700; background: var(--bg-field); border: 1px solid var(--border); color:white; border-radius:10px; cursor:pointer;">Wyloguj</button>
                </div>
                <div class="search-box">
                    <input type="text" id="searchUser" placeholder="Szukaj znajomego po nicku...">
                    <button onclick="window.startChatWithSearchedUser()">Czat</button>
                </div>
            </div>

            <div class="section-title">Relacje i Skróty</div>
            <div class="stories-container" id="storiesContainer">
                <div class="story-wrapper">
                    <div class="story-circle add-story" onclick="window.createNewStory()">+</div>
                    <span style="color: var(--text-muted)">Dodaj</span>
                </div>
                <div class="story-wrapper">
                    <div class="story-circle add-shortcut" onclick="window.createNewShortcut()">⚙️</div>
                    <span style="color: var(--text-muted)">Skrót</span>
                </div>
            </div>

            <div class="section-title">Aktywne rozmowy</div>
            <div class="recent-chats" id="recentChats"></div>

            <div style="background: var(--bg-surface); padding: 12px 20px; border-bottom: 1px solid var(--border);" id="chatSubHeader">
                <span id="currentChatTitle" style="font-weight:800; color:#fff; font-size:14px; letter-spacing: -0.2px;">Wybierz czat z listy powyżej</span>
            </div>

            <!-- OKNO CZATU -->
            <div id="chat-box">
                <div style="text-align: center; color: var(--text-muted); margin-top: 60px; font-size:14px; padding: 0 40px; line-height: 1.5;">Wyszukaj profil lub kliknij aktywny dymek, aby bezpiecznie snapować w trybie Ghost.</div>
            </div>

            <!-- OKNO INPUTU -->
            <div class="input-area" id="inputArea" style="display: none;">
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
                <button class="icon-btn" onclick="document.getElementById('imageInput').click()">📸</button>
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Napisz znikającą wiadomość...">
                    <button class="send-btn" onclick="window.sendMessage()">Wyślij</button>
                </div>
            </div>
        </div>

        <div id="panel-map" class="panel">
            <div id="map"></div>
        </div>

        <!-- NAVBAR NA DOLE -->
        <div class="tab-bar">
            <button class="tab-btn active" id="btn-tab-chat" onclick="window.switchTab('chat')">💬 <span style="margin-top:2px;">Czaty</span></button>
            <button class="tab-btn" id="btn-tab-map" onclick="window.switchTab('map')">🗺️ <span style="margin-top:2px;">SnapMap</span></button>
        </div>
    </div>

    <!-- MODAL DO RELACJI -->
    <div class="story-modal" id="storyModal">
        <div class="story-top-info">
            <div style="display:flex; align-items:center; gap:8px;">
                <span style="font-size:20px;">👀</span> 
                <span id="storyModalAuthor" style="color:white; font-size:16px;">Autor</span> 
                <span id="storyViewsBadge" style="font-size:11px; background:rgba(255,255,255,0.1); padding:3px 8px; border-radius:8px; font-weight: 700;"></span>
            </div>
            <div id="storyDeleteContainer"></div>
        </div>
        <div id="storyModalContent" style="width: 100%; display: flex; justify-content: center; align-items: center;" onclick="window.closeStoryModal()"></div>
    </div>

    <!-- LOGIKA SYSTEMOWA FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, where, onSnapshot, updateDoc, deleteDoc, orderBy, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Konfiguracja Twojej bazy danych Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDQ3TtLG4Vem4LiElySooJnnJPQy-DRBSw",
            authDomain: "apka-32bf2.firebaseapp.com",
            projectId: "apka-32bf2",
            storageBucket: "apka-32bf2.firebasestorage.app",
            messagingSenderId: "636664684649",
            appId: "1:636664684649:web:2b38ae035e2d4c112b42f8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Zmienne stanowe
        let currentUser = null;
        let activeChatUser = null;
        let activeShortcut = null;
        let map = null;
        let mapMarker = null;
        let activeListeners = [];

        window.toggleAuthScreens = function(showLogin) {
            document.getElementById('loginScreen').style.display = showLogin ? 'flex' : 'none';
            document.getElementById('registerScreen').style.display = showLogin ? 'none' : 'flex';
        };

        window.handleRegister = async function() {
            const user = document.getElementById('regUsername').value.trim().toLowerCase();
            const pass = document.getElementById('regPassword').value.trim();
            if(!user || !pass) return alert("Uzupełnij pola!");

            try {
                const userRef = doc(db, "users", user);
                const userSnap = await getDoc(userRef);

                if(userSnap.exists()) {
                    return alert("Ten użytkownik już istnieje!");
                }

                const hashedPassword = CryptoJS.SHA256(pass).toString();
                await setDoc(userRef, {
                    username: user,
                    password: hashedPassword,
                    createdAt: Date.now(),
                    shortcuts: []
                });

                alert("Konto utworzone! Możesz się zalogować.");
                window.toggleAuthScreens(true);
            } catch(e) {
                alert("Błąd rejestracji: " + e.message);
            }
        };

        window.handleLogin = async function() {
            const user = document.getElementById('loginUsername').value.trim().toLowerCase();
            const pass = document.getElementById('loginPassword').value.trim();
            if(!user || !pass) return alert("Uzupełnij pola!");

            try {
                const userRef = doc(db, "users", user);
                const userSnap = await getDoc(userRef);

                if(!userSnap.exists()) {
                    return alert("Nie ma takiego użytkownika!");
                }

                const userData = userSnap.data();
                const hashedPassword = CryptoJS.SHA256(pass).toString();
                
                if(userData.password !== hashedPassword) {
                    return alert("Błędne hasło!");
                }

                // GWARANCJA BEZPIECZEŃSTWA (NAPRAWA BŁĘDU): 
                // Nawet jeśli w dokumencie DB brak pola username, wymuszamy je z inputu logowania.
                currentUser = {
                    username: user,
                    ...userData
                };
                
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appContainer').style.display = 'flex';
                document.getElementById('displayMyName').innerText = currentUser.username;

                initApp();
            } catch(e) {
                alert("Błąd logowania: " + e.message);
            }
        };

        function initApp() {
            if(!currentUser || !currentUser.username) {
                alert("Wystąpił błąd krytyczny profilu. Strona zostanie przeładowana.");
                location.reload();
                return;
            }
            listenToGlobalStories();
            listenToActiveChatsList();
            initSnapMap();
            listenToPrivateNotifications();
            
            document.getElementById('imageInput').addEventListener('change', function() {
                sendImage(this);
            });
        }

        // --- OBSŁUGA STRUMIENIA WIADOMOŚCI-WIDMO ---
        function listenToMessages(chatWith) {
            activeListeners.forEach(unsub => unsub());
            activeListeners = [];

            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = '';

            const q = query(
                collection(db, "ghost_messages"),
                where("receiverId", "==", currentUser.username),
                where("senderId", "==", chatWith)
            );

            const unsub = onSnapshot(q, (snapshot) => {
                snapshot.docChanges().forEach(async (change) => {
                    if (change.type === "added") {
                        const msgData = change.doc.data();
                        const msgId = change.doc.id;

                        renderGhostMessage(msgData, msgId);
                        await deleteDoc(doc(db, "ghost_messages", msgId));
                    }
                });
            });

            activeListeners.push(unsub);
        }

        function renderGhostMessage(data, id) {
            const chatBox = document.getElementById('chat-box');
            const wrapper = document.createElement('div');
            wrapper.className = "msg-wrapper them";

            let contentHTML = '';
            if(data.type === 'image') {
                contentHTML = `<img src="${data.content}" style="max-width:200px; border-radius:12px; display:block;" />`;
            } else {
                contentHTML = data.content;
            }

            wrapper.innerHTML = `
                <div class="msg them ghost-blur" title="Przytrzymaj, aby zobaczyć">
                    ${contentHTML}
                </div>
                <span style="font-size:9px; color:var(--text-muted); margin-top:4px; margin-left:4px;">Znikający Snap</span>
            `;

            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        window.sendMessage = async function() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if(!content || !activeChatUser) return;

            const chatBox = document.getElementById('chat-box');
            const wrapper = document.createElement('div');
            wrapper.className = "msg-wrapper me";
            wrapper.innerHTML = `<div class="msg me">${content}</div>`;
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;

            await addDoc(collection(db, "ghost_messages"), {
                senderId: currentUser.username,
                receiverId: activeChatUser,
                content: content,
                type: 'text',
                timestamp: Date.now()
            });

            await setDoc(doc(db, "active_chats", `${currentUser.username}_${activeChatUser}`), {
                userA: currentUser.username,
                userB: activeChatUser,
                lastActive: Date.now()
            });

            input.value = '';
        };

        async function sendImage(fileInput) {
            const file = fileInput.files[0];
            if(!file || !activeChatUser) return;

            const reader = new FileReader();
            reader.onloadend = async function() {
                const base64Data = reader.result;

                const chatBox = document.getElementById('chat-box');
                const wrapper = document.createElement('div');
                wrapper.className = "msg-wrapper me";
                wrapper.innerHTML = `<div class="msg me" style="background:transparent; padding:0; border:none;"><img src="${base64Data}" style="max-width:200px; border-radius:14px; display:block;" /></div>`;
                chatBox.appendChild(wrapper);
                chatBox.scrollTop = chatBox.scrollHeight;

                await addDoc(collection(db, "ghost_messages"), {
                    senderId: currentUser.username,
                    receiverId: activeChatUser,
                    content: base64Data,
                    type: 'image',
                    timestamp: Date.now()
                });
            };
            reader.readAsDataURL(file);
        }

        // --- STORIES (RELACJE) ---
        window.createNewStory = async function() {
            const content = prompt("Treść Twojej nowej relacji:");
            if(!content) return;

            const maxViews = prompt("Maksymalna ilość wyświetleń przez jednego użytkownika (1 lub 2):", "1");
            const allowedViews = (maxViews === "2") ? 2 : 1;

            await addDoc(collection(db, "stories"), {
                author: currentUser.username,
                content: content,
                type: 'text',
                maxViews: allowedViews,
                viewsCount: 0,
                viewedBy: [],
                createdAt: Date.now()
            });

            alert("Relacja dodana pomyślnie!");
        };

        function listenToGlobalStories() {
            const container = document.getElementById('storiesContainer');
            const q = query(collection(db, "stories"));
            
            onSnapshot(q, (snapshot) => {
                const items = container.querySelectorAll('.story-wrapper');
                items.forEach((item, index) => { if(index > 1) item.remove(); });

                snapshot.forEach((docSnap) => {
                    const story = docSnap.data();
                    const storyId = docSnap.id;

                    if(story.viewedBy && story.viewedBy.filter(u => u === currentUser.username).length >= story.maxViews) {
                        return; 
                    }

                    const wrapper = document.createElement('div');
                    wrapper.className = "story-wrapper";
                    wrapper.innerHTML = `
                        <div class="story-circle" id="circle-${storyId}">
                            <div class="story-text-avatar">${story.author.substring(0, 2)}</div>
                        </div>
                        <span style="font-size:11px; color:#fff; font-weight:500;">${story.author}</span>
                    `;

                    wrapper.querySelector('.story-circle').addEventListener('click', () => openStory(storyId, story));
                    container.appendChild(wrapper);
                });
            });
        }

        async function openStory(storyId, story) {
            const modal = document.getElementById('storyModal');
            const contentZone = document.getElementById('storyModalContent');
            const authorZone = document.getElementById('storyModalAuthor');
            const badgeZone = document.getElementById('storyViewsBadge');
            const deleteContainer = document.getElementById('storyDeleteContainer');

            authorZone.innerText = `@${story.author}`;
            badgeZone.innerText = `Limit: ${story.maxViews}x`;
            contentZone.innerHTML = `<div class="story-text-content">${story.content}</div>`;

            if(story.author === currentUser.username) {
                deleteContainer.innerHTML = `<button class="delete-story-btn">Usuń</button>`;
                deleteContainer.querySelector('button').addEventListener('click', () => window.deleteStory(storyId));
            } else {
                deleteContainer.innerHTML = '';
            }

            modal.style.display = 'flex';

            if(story.author !== currentUser.username) {
                const currentViews = story.viewedBy || [];
                const updatedViewedBy = [...currentViews, currentUser.username];
                const timesThisUserWatched = updatedViewedBy.filter(u => u === currentUser.username).length + 1;

                if(story.maxViews === 2 && timesThisUserWatched === 2) {
                    await addDoc(collection(db, "ghost_notifications"), {
                        targetUser: story.author,
                        senderUser: currentUser.username,
                        message: `Użytkownik ${currentUser.username} wyświetlił Twoją relację po raz drugi i ostatni!`,
                        timestamp: Date.now()
                    });
                }

                const storyRef = doc(db, "stories", storyId);
                await updateDoc(storyRef, {
                    viewsCount: (story.viewsCount || 0) + 1,
                    viewedBy: arrayUnion(currentUser.username)
                });
            }
        }

        window.closeStoryModal = function() {
            document.getElementById('storyModal').style.display = 'none';
        };

        window.deleteStory = async function(storyId) {
            if(confirm("Czy chcesz całkowicie wymazać tę relację?")) {
                await deleteDoc(doc(db, "stories", storyId));
                window.closeStoryModal();
            }
        };

        // --- POWIADOMIENIA ---
        function listenToPrivateNotifications() {
            const q = query(
                collection(db, "ghost_notifications"), 
                where("targetUser", "==", currentUser.username)
            );

            onSnapshot(q, (snapshot) => {
                snapshot.docChanges().forEach(async (change) => {
                    if(change.type === "added") {
                        const notif = change.doc.data();
                        const notifId = change.doc.id;

                        alert(`🔔 SnapAlert: ${notif.message}`);
                        await deleteDoc(doc(db, "ghost_notifications", notifId));
                    }
                });
            });
        }

        // --- SKRÓTY ---
        window.createNewShortcut = async function() {
            const name = prompt("Podaj unikalną nazwę skrótu grupy:");
            if(!name) return;
            activeShortcut = name;
            alert(`Skrót [${name}] został aktywowany.`);
        };

        function listenToActiveChatsList() {
            const container = document.getElementById('recentChats');
            const q = query(collection(db, "active_chats"));
            
            onSnapshot(q, (snapshot) => {
                container.innerHTML = '';
                let addedUsers = new Set();

                snapshot.forEach((docSnap) => {
                    const c = docSnap.data();
                    let target = (c.userA === currentUser.username) ? c.userB : c.userA;
                    
                    if(target !== currentUser.username && !addedUsers.has(target)) {
                        addedUsers.add(target);
                        const chip = document.createElement('div');
                        chip.className = `chat-chip ${activeChatUser === target ? 'active' : ''}`;
                        chip.innerHTML = `👤 <span>${target}</span>`;
                        chip.addEventListener('click', () => selectChat(target, chip));
                        container.appendChild(chip);
                    }
                });
            });
        }

        window.startChatWithSearchedUser = async function() {
            const target = document.getElementById('searchUser').value.trim().toLowerCase();
            if(!target || target === currentUser.username) return alert("Nieprawidłowy nick!");

            const userRef = doc(db, "users", target);
            const userSnap = await getDoc(userRef);

            if(!userSnap.exists()) {
                return alert("Taki użytkownik nie istnieje.");
            }

            selectChat(target);
        };

        function selectChat(username, element = null) {
            activeChatUser = username;
            document.getElementById('currentChatTitle').innerText = `Rozmowa z: @${username} ${activeShortcut ? `[${activeShortcut}]` : ''}`;
            document.getElementById('inputArea').style.display = 'flex';
            
            document.querySelectorAll('.chat-chip').forEach(el => el.classList.remove('active'));
            if(element) element.classList.add('active');

            listenToMessages(username);
        }

        // --- TAB SWITCHER ---
        window.switchTab = function(tab) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            document.getElementById(`panel-${tab}`).classList.add('active');
            document.getElementById(`btn-tab-${tab}`).classList.add('active');

            if(tab === 'map') {
                setTimeout(() => { map.invalidateSize(); }, 250);
                updateMyLocation();
            }
        };

        // --- MAPA (SNAPMAP) ---
        function initSnapMap() {
            map = L.map('map', { zoomControl: false }).setView([52.237, 21.017], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CartoDB'
            }).addTo(map);
        }

        function updateMyLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;

                    if (mapMarker) {
                        mapMarker.setLatLng([lat, lng]);
                    } else {
                        mapMarker = L.marker([lat, lng]).addTo(map)
                            .bindPopup(`<b>Ty (${currentUser.username})</b><br>Tryb maskowania aktywny.`).openPopup();
                    }
                    map.setView([lat, lng], 14);
                });
            }
        }
    </script>
</body>
</html>
